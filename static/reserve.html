<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>爱丽丝学院 · 客人预约</title>
<style>
:root{--pink:#ff8fc7;--lav:#d9c8ff;--ink:#5d4566;--line:#f0c6dc;--danger:#ff6e92}*{box-sizing:border-box}body{margin:0;font-family:"Yu Gothic UI","Microsoft YaHei",system-ui,sans-serif;color:var(--ink);background:linear-gradient(135deg,#fff7fb,#f5edff 50%,#eaf8ff);padding:18px}.wrap{max-width:980px;margin:0 auto}.hero{border-radius:28px;padding:22px;background:linear-gradient(135deg,var(--pink),var(--lav));color:white;box-shadow:0 12px 28px #ff8fc755;margin-bottom:16px}.hero h1{margin:0;font-size:28px}.card{background:rgba(255,255,255,.94);border:2px solid var(--line);border-radius:24px;padding:16px;margin-bottom:14px;box-shadow:0 10px 24px #b68bac1f}.form{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}input,select,textarea,button{border:2px solid var(--line);border-radius:14px;padding:11px;background:white;color:var(--ink);font-weight:800;outline:none}button{cursor:pointer}.primary{border:0;background:linear-gradient(135deg,var(--pink),#ffb4d9);color:white}.soft{background:white}.danger{border:0;background:var(--danger);color:white}.note{font-size:13px;line-height:1.7;opacity:.85}.slot{display:inline-block;margin:5px;padding:8px 10px;border-radius:999px;border:2px solid var(--line);background:#fff0f7;font-weight:900;cursor:pointer}.slot.on{outline:3px solid var(--pink);background:white}.girl{border:2px solid var(--line);border-radius:20px;padding:14px;margin:10px 0;background:#fffafd}.girl h3{margin:0 0 8px;color:#e75ca2}.hide{display:none!important}@media(max-width:720px){.form{grid-template-columns:1fr}}
</style></head><body><div class="wrap">
<div class="hero"><h1>🎀 爱丽丝学院 · 客人预约</h1><p>注册审核通过后自动成为 SVIP，可以预约纯出勤表中的空时间段。预约单位：30分钟。</p></div>
<div class="card"><h2>1. 注册 / 登录</h2><p class="note">第一次使用请填写用户名、LINE名、手机号并提交注册。审核通过后，用用户名 + 手机号登录。</p><div class="form"><input id="username" placeholder="用户名"><input id="lineName" placeholder="LINE名"><input id="phone" placeholder="手机号"><button class="primary" onclick="registerCustomer()">提交注册</button><button class="soft" onclick="loginCustomer()">登录/刷新状态</button></div><p id="loginMsg" class="note"></p></div>
<div id="reserveBox" class="card hide"><h2>2. 选择预约时间</h2><div class="form"><input id="reserveDate" type="date" onchange="loadAvailable()"><select id="girlFilter" onchange="loadAvailable()"><option value="">全部女孩</option></select><input id="reserveNote" placeholder="备注，可不填"><button class="soft" onclick="loadAvailable()">刷新空档</button></div><div id="availableList"></div></div>
</div><script>
let account=null, selected=null, girls=[];
const today=new Date(); const todayStr=today.toISOString().slice(0,10); reserveDate.value=todayStr;
function yen(n){return '¥'+Number(n||0).toLocaleString('ja-JP')}
async function post(url,body){const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body||{})});const j=await r.json().catch(()=>({ok:false,error:'接口错误'}));if(!r.ok||j.ok===false)throw new Error(j.error||'操作失败');return j}
function saveAccount(a){account=a; localStorage.setItem('alice_customer_account',JSON.stringify(a)); reserveBox.classList.toggle('hide',a.status!=='已通过'); loginMsg.textContent=a.status==='已通过'?`✅ ${a.username} 已通过审核，会员等级：${a.member_level||'svip'}`:`⏳ 当前状态：${a.status||'待审核'}，请等待管理员审核`; if(a.status==='已通过') loadAvailable();}
async function registerCustomer(){try{const j=await post('/api/customer_register',{username:username.value,line_name:lineName.value,phone:phone.value});saveAccount(j.account||{username:username.value,line_name:lineName.value,phone:phone.value,status:j.status,member_level:'svip'});}catch(e){alert(e.message)}}
async function loginCustomer(){try{const j=await post('/api/customer_login',{username:username.value,phone:phone.value});saveAccount(j.account);}catch(e){alert(e.message)}}
async function loadAvailable(){try{const j=await post('/api/customer_available',{date:reserveDate.value||todayStr,girl_name:girlFilter.value});girls=j.girls||[]; if(!girlFilter.dataset.loaded){girlFilter.innerHTML='<option value="">全部女孩</option>'+girls.map(g=>`<option>${g.girl}</option>`).join('');girlFilter.dataset.loaded='1'} renderAvailable();}catch(e){availableList.innerHTML='<p class="note">读取失败：'+e.message+'</p>'}}
function renderAvailable(){let h='';girls.forEach(g=>{h+=`<div class="girl"><h3>${g.girl} <span class="note">${g.start}-${g.end} ${g.price?yen(g.price):''}</span></h3>`; if(!g.slots.length){h+='<p class="note">暂无空档</p>'}else{g.slots.forEach(s=>{h+=`<span class="slot" onclick="pickSlot('${g.girl}','${s.start}','${s.end}',this)">${s.label}</span>`})} h+='</div>'}); availableList.innerHTML=h||'<p class="note">这一天还没有可预约出勤。</p>'}
function pickSlot(girl,start,end,el){document.querySelectorAll('.slot').forEach(x=>x.classList.remove('on'));el.classList.add('on');selected={girl,start,end}; setTimeout(submitReserve,80)}
async function submitReserve(){if(!account||!selected)return; if(!confirm(`确认预约？\n${reserveDate.value} ${selected.girl} ${selected.start}-${selected.end}`))return; try{const j=await post('/api/customer_reserve',{account_id:account.id,date:reserveDate.value,girl_name:selected.girl,start_time:selected.start,end_time:selected.end,note:reserveNote.value});alert(j.message||'已提交');selected=null;loadAvailable();}catch(e){alert(e.message)}}
try{const a=JSON.parse(localStorage.getItem('alice_customer_account')||'null');if(a){username.value=a.username||'';lineName.value=a.line_name||'';phone.value=a.phone||'';saveAccount(a)}}catch(e){}
</script></body></html>
