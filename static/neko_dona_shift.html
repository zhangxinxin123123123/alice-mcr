<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>喵喵 DONA DONA 人材 LIST</title>
<style>
:root{
  --bg:#080712;
  --panel:#150b22;
  --ink:#f9efff;
  --muted:#b8a7c9;
  --pink:#ff2f9a;
  --cyan:#21f7ff;
  --yellow:#ffd447;
  --dimline:rgba(255,47,154,.32);
}
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  font-family:"Yu Gothic UI","Microsoft YaHei",system-ui,sans-serif;
  color:var(--ink);
  background:
    linear-gradient(90deg,rgba(33,247,255,.05) 1px,transparent 1px),
    linear-gradient(rgba(255,47,154,.06) 1px,transparent 1px),
    radial-gradient(circle at 12% 8%,rgba(255,47,154,.24),transparent 24%),
    radial-gradient(circle at 88% 12%,rgba(33,247,255,.18),transparent 22%),
    #070611;
  background-size:48px 48px,48px 48px,100% 100%,100% 100%,100% 100%;
  padding:6px;
}
button,input,select{font:inherit;outline:none}
.shell{
  min-height:calc(100vh - 12px);
  border:2px solid var(--pink);
  border-radius:18px;
  overflow:hidden;
  background:linear-gradient(180deg,rgba(12,9,25,.96),rgba(8,7,18,.98));
  box-shadow:0 0 0 1px rgba(33,247,255,.2),0 0 28px rgba(255,47,154,.22);
}
.topbar{
  display:grid;
  grid-template-columns:minmax(260px,1fr) auto auto;
  gap:14px;
  align-items:center;
  min-height:52px;
  padding:10px 18px;
  border-bottom:1px solid rgba(33,247,255,.65);
  background:linear-gradient(90deg,#201127,#0d1020 60%,#1b0d25);
}
.brand{display:flex;align-items:center;gap:14px;min-width:0}
.bolt{color:var(--cyan);text-shadow:2px 0 var(--pink),-2px 0 var(--yellow);font-size:24px;font-weight:900}
.brand h1{
  margin:0;
  font-size:24px;
  line-height:1;
  color:#fff;
  text-shadow:3px 0 var(--cyan),-3px 0 var(--pink),0 0 12px rgba(255,47,154,.85);
  white-space:nowrap;
}
.capsule{
  justify-self:center;
  border:1px solid var(--cyan);
  border-radius:999px;
  padding:8px 18px;
  color:#d8fbff;
  background:rgba(33,247,255,.08);
  font-weight:900;
  letter-spacing:2px;
  box-shadow:inset 0 0 12px rgba(33,247,255,.18);
  white-space:nowrap;
}
.tabs{display:flex;gap:8px;justify-content:flex-end}
.tab-btn,.neon-btn{
  border:1px solid var(--pink);
  color:#08111a;
  background:linear-gradient(#ffe86b,#ffac25);
  padding:9px 16px;
  border-radius:8px;
  font-weight:900;
  cursor:pointer;
  box-shadow:0 0 0 1px rgba(255,47,154,.4),0 4px 0 #b44500;
}
.tab-btn.on{background:linear-gradient(#61ffff,#00d7ff);box-shadow:0 0 0 1px rgba(33,247,255,.7),0 4px 0 #0077a3}
.subhead{
  display:grid;
  grid-template-columns:minmax(230px,1fr) auto;
  gap:12px;
  align-items:end;
  padding:14px 20px 8px;
  border-bottom:1px dashed var(--dimline);
}
.subhead h2{margin:0;font-size:25px;color:#ffd2e7;text-shadow:0 0 12px rgba(255,47,154,.75)}
.subhead h2::before,.subhead h2::after{content:"▼";color:var(--pink);font-size:16px;margin:0 14px 0 6px}
.subhead h2::after{margin:0 6px 0 14px}
.subcode{color:var(--cyan);font-weight:900;letter-spacing:2px;font-size:12px}
.toolbar{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  align-items:center;
  padding:14px 16px 10px;
}
.field,.selectish{
  border:1px solid var(--cyan);
  border-radius:8px;
  min-height:34px;
  padding:8px 10px;
  color:#f8fdff;
  background:#0b2436;
  font-weight:900;
  box-shadow:inset 0 0 10px rgba(33,247,255,.14);
}
.field::placeholder{color:#7bcbd3}
.date-field{width:150px}
.count-box{display:flex;align-items:center;gap:9px;color:#ffe894;font-weight:900}
.count-num{min-width:62px;text-align:center;border:1px solid var(--cyan);border-radius:7px;padding:7px 16px;color:#fff;background:#09253a}
.statusline{color:var(--cyan);font-size:12px;font-weight:900}
.list{display:flex;flex-direction:column;gap:8px;padding:8px 16px 12px}
.person-card{
  display:grid;
  grid-template-columns:96px minmax(250px,1.2fr) minmax(170px,.65fr) minmax(290px,1.1fr) minmax(260px,.95fr) 92px;
  gap:8px;
  align-items:center;
  min-height:92px;
  padding:8px;
  border:2px solid var(--pink);
  border-radius:12px;
  background:linear-gradient(90deg,rgba(255,47,154,.28),rgba(25,12,38,.96) 32%,rgba(11,9,24,.98));
  box-shadow:inset 5px 0 0 var(--pink),0 0 16px rgba(255,47,154,.18);
}
.avatar-box{
  height:74px;
  border:2px solid var(--cyan);
  border-radius:9px;
  overflow:hidden;
  background:linear-gradient(145deg,#13273b,#2b1840);
  display:flex;
  align-items:center;
  justify-content:center;
  color:#d6fbff;
  font-size:11px;
  font-weight:900;
  text-align:center;
  line-height:1.45;
  box-shadow:inset 0 0 16px rgba(33,247,255,.25);
}
.avatar-box img{width:100%;height:100%;object-fit:cover;display:block}
.id-badge{display:inline-block;border:1px solid var(--cyan);border-radius:5px;color:var(--cyan);background:#020b14;padding:2px 7px;font-size:10px;font-weight:900}
.name-row{display:flex;align-items:center;gap:8px;margin:6px 0 5px;min-width:0}
.name,.edit-name{
  min-width:0;
  color:#fff;
  font-size:19px;
  font-weight:900;
  text-shadow:2px 0 var(--pink),0 0 12px rgba(255,255,255,.34);
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.edit-name{width:100%;border:1px solid rgba(255,47,154,.5);border-radius:6px;padding:4px 8px;background:rgba(255,47,154,.18)}
.remark,.edit-remark{min-height:28px;border:1px dashed var(--dimline);border-radius:6px;padding:6px 8px;color:#f7b8d7;background:rgba(255,47,154,.12);font-size:12px;line-height:1.35;overflow:hidden}
.edit-remark{width:100%;height:38px;resize:vertical}
.stack{display:grid;gap:7px}
.time-row,.price-row{min-height:30px;border:1px solid var(--cyan);border-radius:8px;padding:5px 10px;background:#0b273a;color:#dfffff;font-weight:900}
.price-row{border-color:#d2aa20;color:#ffe55d;background:rgba(255,212,71,.16)}
.price-row{display:flex;align-items:center;gap:6px}
.price-input{width:100%;min-width:0;border:0;background:transparent;color:#ffe55d;font-weight:900}
.mini-select{width:100%;min-width:0;border:1px solid var(--pink);border-radius:999px;padding:4px 28px 4px 10px;color:#fff;background:#2b0a23;font-size:12px;font-weight:900}
.dragging{opacity:.62}
.person-card{cursor:grab}
.person-card:active{cursor:grabbing}
.matrix-title{color:var(--cyan);font-size:11px;font-weight:900;letter-spacing:1px;margin-bottom:3px}
.tag-grid,.param-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.param-line{display:grid;grid-template-columns:42px 1fr;align-items:center;gap:5px;color:#ff9bcc;font-size:12px;font-weight:900}
.side-actions{display:grid;gap:6px}
.pill-btn{border:1px solid var(--pink);border-radius:8px;padding:7px 8px;color:#080712;background:linear-gradient(#5dffff,#03d9ff);font-size:12px;font-weight:900;cursor:pointer}
.pill-btn.danger{color:#fff;background:#4b0b36}
.empty{min-height:240px;border:1px dashed var(--dimline);border-radius:12px;display:flex;align-items:center;justify-content:center;color:#ffaad4;font-weight:900}
.small-btn{border:1px solid var(--cyan);border-radius:7px;padding:7px 10px;color:#dfffff;background:#10243b;font-size:12px;font-weight:900;cursor:pointer}
.small-btn.primary{border-color:var(--pink);background:#4a1234}
.image-panel{margin:4px 16px 10px;border-top:1px dashed var(--dimline);padding-top:10px}
.image-actions{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:10px}
.image-info{color:#ffe894;font-size:12px;font-weight:900}
.image-preview{display:block;max-width:420px;width:100%;border:2px solid var(--pink);border-radius:10px;background:#080712;box-shadow:0 0 18px rgba(255,47,154,.22)}
@media(max-width:1120px){
  .person-card{grid-template-columns:82px 1fr}
  .side-actions{grid-template-columns:repeat(3,minmax(0,1fr));grid-column:1 / -1}
}
@media(max-width:720px){
  body{padding:0}
  .shell{border-radius:0;min-height:100vh}
  .topbar,.subhead{grid-template-columns:1fr}
  .capsule{justify-self:start}
  .brand h1{font-size:20px;white-space:normal}
  .toolbar{align-items:stretch}
  .field,.selectish{width:100%;min-width:0}
  .person-card{grid-template-columns:1fr}
  .avatar-box{height:180px}
}
</style>
</head>
<body>
<div class="shell">
  <header class="topbar">
    <div class="brand"><span class="bolt">↯</span><h1>NEKO DONA DONA 人材 LIST</h1><span class="bolt">↯</span></div>
    <div class="capsule">NEKO MIAOMIAO / CYBER SHIFT</div>
    <div class="tabs">
      <button class="tab-btn on" type="button">喵喵</button>
      <button class="tab-btn" type="button">出勤</button>
    </div>
  </header>
  <section class="subhead">
    <h2>横向き人材出勤表</h2>
    <div class="subcode">TAG / STATUS / AVATAR / PARAMETER</div>
  </section>
  <section class="toolbar">
    <input id="shiftDate" class="field date-field" type="date">
    <input id="searchInput" class="field" placeholder="搜索喵喵名字 / 备注" oninput="render()">
    <button class="neon-btn" type="button" onclick="loadNekoProfiles()">刷新喵喵资料</button>
    <button class="small-btn primary" type="button" onclick="selectAllVisible()">全部加入出勤</button>
    <button class="small-btn" type="button" onclick="clearDay()">清空当日</button>
    <button class="small-btn" type="button" onclick="copyShiftText()">复制通报</button>
    <button class="small-btn primary" type="button" onclick="generateCustomerImage()">生成客人图</button>
    <span class="count-box">喵喵人数 <span id="totalCount" class="count-num">0</span></span>
    <span class="count-box">出勤人数 <span id="shiftCount" class="count-num">0</span></span>
    <span class="statusline" id="statusLine">准备读取喵喵资料。</span>
  </section>
  <section class="image-panel" id="customerImagePanel" hidden>
    <div class="image-actions">
      <span class="image-info" id="customerImageInfo"></span>
      <button class="small-btn primary" type="button" onclick="copyCustomerImage()">复制图片</button>
      <button class="small-btn" type="button" onclick="downloadCustomerImage()">下载PNG</button>
    </div>
    <img class="image-preview" id="customerImagePreview" alt="喵喵每日出勤图">
  </section>
  <main class="list" id="shiftList"></main>
</div>

<script>
(function(){
  const today = new Date().toISOString().slice(0,10);
  const DONA_TAGS = ["好色","巨乳","小恶魔","辣妹","纯洁","顺从","新人","运动部","积极","清楚","双马尾","萝莉","病娇","敏感","安穏","M气质","S气质","心理病","童颜","清纯","傲娇","地雷系","长腿","校花","姐姐","妹系"];
  const STATUS_OPTIONS = ["出勤中","待机中","休息前","夜出勤"];
  const BOOKING_OPTIONS = ["预约可","不可约"];
  const PARAM_KEYS = [["mind","心灵"],["body","身材"],["face","颜值"],["tech","技巧"]];
  const GRADES = ["S","A","B","C"];
  const DEFAULT_PARAMS = {mind:"B", body:"S", face:"A", tech:"A"};
  let profiles = [];
  let shifts = {};
  let dragKey = "";
  let customerImageBlob = null;
  let customerImageFilename = "";

  function authHeaders(){
    const auth = JSON.parse(localStorage.getItem("alice_auth")||"null");
    return auth ? {"X-Alice-Role":auth.role} : {};
  }
  function escapeHtml(v){return String(v??"").replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]));}
  function jsAttr(v){
    return escapeHtml(String(v??"").replace(/\\/g,"\\\\").replace(/'/g,"\\'"));
  }
  function yen(n){return "¥" + Math.round(Number(n||0)).toLocaleString();}
  function moneyInput(v){
    const text = String(v ?? "").replace(/[^\d.万wW]/g,"");
    const m = text.match(/[\d.]+/);
    if(!m) return 0;
    const n = Number(m[0] || 0);
    if(!Number.isFinite(n)) return 0;
    return /万|w/i.test(text) ? Math.round(n * 10000) : Math.round(n);
  }
  function dayKey(){return "neko_dona_shift_" + (shiftDate.value || today);}
  function loadDay(){try{shifts = JSON.parse(localStorage.getItem(dayKey()) || "{}") || {};}catch(e){shifts={};}}
  function saveDay(){localStorage.setItem(dayKey(), JSON.stringify(shifts));}
  function normalizeTime(t){return String(t||"").trim() || "18:00";}
  function timeOptions(selected){
    selected = normalizeTime(selected);
    let out = "";
    for(let h=12; h<=29; h++){
      for(const m of [0,30]){
        const v = String(h).padStart(2,"0") + ":" + String(m).padStart(2,"0");
        out += `<option value="${v}" ${v===selected?"selected":""}>${h>=24?String(h).padStart(2,"0"):String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}</option>`;
      }
    }
    return out;
  }
  function profileKey(p){return p.name || p.id;}
  function splitTitleName(v){
    const notes = [];
    const raw = String(v || "");
    const name = raw.replace(/（([^）]+)）|\(([^)]+)\)/g, (_, a, b) => {
      const note = String(a || b || "").trim();
      if(note && !notes.includes(note)) notes.push(note);
      return " ";
    }).replace(/\s+/g," ").trim();
    return {name:name || raw, remark:notes.join(" / ")};
  }
  function joinNotes(){
    const notes = [];
    Array.from(arguments).forEach(v => {
      String(v || "").split(" / ").map(x=>x.trim()).filter(Boolean).forEach(x => {
        if(!notes.includes(x)) notes.push(x);
      });
    });
    return notes.join(" / ");
  }
  function baseName(p){
    return splitTitleName(p.name).name || p.name || "";
  }
  function baseRemark(p){
    return joinNotes(splitTitleName(p.name).remark, p.remark);
  }
  function nextOrder(){
    const nums = Object.values(shifts).map(s => Number(s && s.order)).filter(Number.isFinite);
    return nums.length ? Math.max(...nums) + 1 : 0;
  }
  function displayName(p){
    const s = shifts[profileKey(p)] || {};
    return String(s.name || baseName(p));
  }
  function displayRemark(p){
    const s = shifts[profileKey(p)] || {};
    return String(s.remark || baseRemark(p));
  }
  function defaultShift(p){
    return {start:"18:00", end:"23:00", tags:["新人","好色","巨乳","顺从"], status:"出勤中", booking:"预约可", name:baseName(p), remark:baseRemark(p), price:Number(p.price || 0), order:nextOrder(), params:{...DEFAULT_PARAMS}};
  }
  function normalizeShift(s, p){
    s = s || {};
    s.start = normalizeTime(s.start || "18:00");
    s.end = normalizeTime(s.end || "23:00");
    if(s.name === undefined) s.name = p ? baseName(p) : "";
    if(s.remark === undefined) s.remark = p ? baseRemark(p) : "";
    if(!moneyInput(s.price) && p && Number(p.price || 0)) s.price = Number(p.price || 0);
    else s.price = moneyInput(s.price);
    if(!Number.isFinite(Number(s.order))) s.order = nextOrder();
    s.tags = Array.isArray(s.tags) ? s.tags.slice(0,4) : [];
    while(s.tags.length < 4) s.tags.push(DONA_TAGS[s.tags.length] || DONA_TAGS[0]);
    if(!STATUS_OPTIONS.includes(s.status)) s.status = STATUS_OPTIONS[0];
    if(s.booking === "预约满") s.booking = "不可约";
    if(!BOOKING_OPTIONS.includes(s.booking)) s.booking = BOOKING_OPTIONS[0];
    s.params = {...DEFAULT_PARAMS, ...(s.params || {})};
    PARAM_KEYS.forEach(([param]) => {
      if(!GRADES.includes(s.params[param])) s.params[param] = DEFAULT_PARAMS[param] || "B";
    });
    return s;
  }
  function ensureShift(p){
    const key = profileKey(p);
    if(!shifts[key]) shifts[key] = defaultShift(p);
    shifts[key] = normalizeShift(shifts[key], p);
    return shifts[key];
  }
  function selectedProfiles(){
    return profiles
      .filter(p => shifts[profileKey(p)])
      .sort((a,b) => (Number(shifts[profileKey(a)]?.order) || 0) - (Number(shifts[profileKey(b)]?.order) || 0));
  }
  function visibleProfiles(){
    const q = String(searchInput.value||"").trim().toLowerCase();
    return profiles.filter(p => !q || [displayName(p),displayRemark(p)].join(" ").toLowerCase().includes(q));
  }
  function selectOptions(values, selected){
    return values.map(v=>`<option value="${escapeHtml(v)}" ${String(v)===String(selected)?"selected":""}>${escapeHtml(v)}</option>`).join("");
  }
  function shiftImageRows(){
    return selectedProfiles().map(p => {
      const s = ensureShift(p);
      return {
        key: profileKey(p),
        name: s.name || baseName(p),
        remark: s.remark || baseRemark(p),
        price: moneyInput(s.price) || moneyInput(p.price),
        image: p.image || "",
        start: s.start,
        end: s.end,
        tags: (s.tags || []).slice(0,4),
        status: s.status,
        booking: s.booking,
        params: {...DEFAULT_PARAMS, ...(s.params || {})},
      };
    });
  }
  function tagSelect(key, idx, selected){
    return `<select class="mini-select" onchange="updateTag('${jsAttr(key)}',${idx},this.value)">${selectOptions(DONA_TAGS, selected || DONA_TAGS[idx] || DONA_TAGS[0])}</select>`;
  }
  function paramSelect(key, param, selected){
    return `<select class="mini-select" onchange="updateParam('${jsAttr(key)}','${param}',this.value)">${selectOptions(GRADES, selected || DEFAULT_PARAMS[param] || "B")}</select>`;
  }
  function renderCard(p, idx){
    const key = profileKey(p);
    const s = ensureShift(p);
    const tags = [...(s.tags||[])];
    while(tags.length < 4) tags.push(DONA_TAGS[tags.length] || DONA_TAGS[0]);
    const params = {...DEFAULT_PARAMS, ...(s.params||{})};
    const name = s.name || p.name || "";
    const remark = s.remark || p.remark || "";
    const price = moneyInput(s.price) || moneyInput(p.price);
    return `<article class="person-card" draggable="true" ondragstart="dragStart(event,'${jsAttr(key)}')" ondragover="dragOver(event)" ondrop="dropShift(event,'${jsAttr(key)}')" ondragend="dragEnd(event)">
      <div class="avatar-box">${p.image ? `<img src="${escapeHtml(p.image)}" alt="">` : "喵喵<br>NO IMAGE"}</div>
      <section>
        <span class="id-badge" title="拖动这一行调整排序">↕ ID ${escapeHtml(p.id || String(idx+1).padStart(3,"0"))}</span>
        <div class="name-row"><input class="edit-name" value="${escapeHtml(name)}" onchange="updateField('${jsAttr(key)}','name',this.value)" draggable="false"></div>
        <textarea class="edit-remark" onchange="updateField('${jsAttr(key)}','remark',this.value)" draggable="false">${escapeHtml(remark || "喵喵资料暂无备注")}</textarea>
      </section>
      <section class="stack">
        <div class="time-row">
          <select class="mini-select" onchange="updateField('${jsAttr(key)}','start',this.value)">${timeOptions(s.start)}</select>
          <select class="mini-select" style="margin-top:5px" onchange="updateField('${jsAttr(key)}','end',this.value)">${timeOptions(s.end)}</select>
        </div>
        <div class="price-row"><input class="price-input" inputmode="numeric" value="${price || ""}" placeholder="${p.price ? Math.round(Number(p.price)) : "手填每小时价格"}" onchange="updatePrice('${jsAttr(key)}',this.value)" draggable="false"><span>/h</span></div>
      </section>
      <section>
        <div class="matrix-title">TAG</div>
        <div class="tag-grid">${tags.map((t,i)=>tagSelect(key,i,t)).join("")}</div>
      </section>
      <section>
        <div class="matrix-title">PARAMETER</div>
        <div class="param-grid">${PARAM_KEYS.map(([param,label])=>`<div class="param-line"><span>${label}</span>${paramSelect(key,param,params[param])}</div>`).join("")}</div>
      </section>
      <section class="side-actions">
        <select class="pill-btn" onchange="updateField('${jsAttr(key)}','status',this.value)">${selectOptions(STATUS_OPTIONS, s.status)}</select>
        <select class="pill-btn" onchange="updateField('${jsAttr(key)}','booking',this.value)">${selectOptions(BOOKING_OPTIONS, s.booking)}</select>
        <button class="pill-btn danger" type="button" onclick="removeShift('${jsAttr(key)}')">移除</button>
      </section>
    </article>`;
  }
  window.render = function(){
    const rows = selectedProfiles();
    totalCount.textContent = String(profiles.length);
    shiftCount.textContent = String(rows.length);
    if(!rows.length){
      const visible = visibleProfiles();
      shiftList.innerHTML = visible.length
        ? visible.map((p,i)=>{
            const name = baseName(p);
            const remark = baseRemark(p) || "喵喵资料暂无备注";
            return `<article class="person-card" style="grid-template-columns:96px minmax(250px,1fr) 110px"><div class="avatar-box">${p.image?`<img src="${escapeHtml(p.image)}" alt="">`:"喵喵<br>NO IMAGE"}</div><section><span class="id-badge">ID ${escapeHtml(p.id||String(i+1).padStart(3,"0"))}</span><div class="name-row"><span class="name">${escapeHtml(name)}</span></div><div class="remark">${escapeHtml(remark).slice(0,120)}</div></section><button class="pill-btn" type="button" onclick="addShift('${jsAttr(profileKey(p))}')">加入</button></article>`;
          }).join("")
        : '<div class="empty">没有匹配的喵喵资料。</div>';
      return;
    }
    shiftList.innerHTML = rows.map(renderCard).join("");
  };
  window.addShift = function(key){
    const p = profiles.find(x => profileKey(x) === key);
    if(p) ensureShift(p);
    saveDay();
    render();
  };
  window.removeShift = function(key){delete shifts[key];saveDay();render();};
  window.updateField = function(key, field, value){
    const p = profiles.find(x => profileKey(x) === key);
    if(!p) return;
    const s = ensureShift(p);
    s[field] = value;
    saveDay();
    render();
  };
  window.updatePrice = function(key, value){
    const p = profiles.find(x => profileKey(x) === key);
    if(!p) return;
    const s = ensureShift(p);
    s.price = moneyInput(value);
    saveDay();
    render();
  };
  window.updateTag = function(key, idx, value){
    const p = profiles.find(x => profileKey(x) === key);
    if(!p) return;
    const s = ensureShift(p);
    s.tags = [...(s.tags||[])];
    s.tags[idx] = value;
    saveDay();
    render();
  };
  window.updateParam = function(key, param, value){
    const p = profiles.find(x => profileKey(x) === key);
    if(!p) return;
    const s = ensureShift(p);
    s.params = {...DEFAULT_PARAMS, ...(s.params||{})};
    s.params[param] = value;
    saveDay();
    render();
  };
  window.dragStart = function(ev, key){
    dragKey = key;
    ev.currentTarget.classList.add("dragging");
    if(ev.dataTransfer){
      ev.dataTransfer.effectAllowed = "move";
      ev.dataTransfer.setData("text/plain", key);
    }
  };
  window.dragOver = function(ev){
    ev.preventDefault();
    if(ev.dataTransfer) ev.dataTransfer.dropEffect = "move";
  };
  window.dropShift = function(ev, targetKey){
    ev.preventDefault();
    const fromKey = dragKey || (ev.dataTransfer ? ev.dataTransfer.getData("text/plain") : "");
    if(!fromKey || fromKey === targetKey) return;
    const keys = selectedProfiles().map(profileKey);
    const from = keys.indexOf(fromKey);
    const to = keys.indexOf(targetKey);
    if(from < 0 || to < 0) return;
    const [moved] = keys.splice(from, 1);
    keys.splice(to, 0, moved);
    keys.forEach((key, idx) => {
      if(shifts[key]) shifts[key].order = idx;
    });
    saveDay();
    render();
  };
  window.dragEnd = function(ev){
    dragKey = "";
    ev.currentTarget.classList.remove("dragging");
  };
  window.selectAllVisible = function(){
    visibleProfiles().forEach(p => ensureShift(p));
    saveDay();
    render();
  };
  window.clearDay = function(){
    if(!confirm("清空当天喵喵多娜出勤表？")) return;
    shifts = {};
    saveDay();
    render();
  };
  window.copyShiftText = async function(){
    const rows = selectedProfiles();
    const d = shiftDate.value || today;
    const text = rows.map(p=>{
      const s = ensureShift(p);
      const params = {...DEFAULT_PARAMS, ...(s.params||{})};
      const price = moneyInput(s.price) || moneyInput(p.price);
      return `${s.name || p.name || ""} ${(s.tags||[]).map(t=>`【${t}】`).join("")} ${s.status} ${s.booking}
${s.start} ~ ${s.end}  ${price ? yen(price) + "/h" : "价格未写"}
心${params.mind} 身${params.body} 颜${params.face} 技${params.tech}
${s.remark || p.remark || ""}`;
    }).join("\n\n");
    try{await navigator.clipboard.writeText(`${d} 喵喵多娜出勤\n\n${text}`.trim());alert("已复制");}
    catch(e){prompt("复制失败，请手动复制：", text);}
  };
  function roundRect(ctx, x, y, w, h, r){
    const rr = Math.min(r, w / 2, h / 2);
    ctx.beginPath();
    ctx.moveTo(x + rr, y);
    ctx.arcTo(x + w, y, x + w, y + h, rr);
    ctx.arcTo(x + w, y + h, x, y + h, rr);
    ctx.arcTo(x, y + h, x, y, rr);
    ctx.arcTo(x, y, x + w, y, rr);
    ctx.closePath();
  }
  function drawText(ctx, text, x, y, maxWidth, lineHeight, maxLines){
    const chars = String(text || "").split("");
    let line = "";
    let lines = [];
    chars.forEach(ch => {
      const next = line + ch;
      if(ctx.measureText(next).width > maxWidth && line){
        lines.push(line);
        line = ch;
      }else{
        line = next;
      }
    });
    if(line) lines.push(line);
    if(maxLines && lines.length > maxLines){
      lines = lines.slice(0, maxLines);
      const last = lines.length - 1;
      while(lines[last] && ctx.measureText(lines[last] + "...").width > maxWidth){
        lines[last] = lines[last].slice(0, -1);
      }
      lines[last] = (lines[last] || "").replace(/[，。,.、\s]+$/,"") + "...";
    }
    lines.forEach((ln, i) => ctx.fillText(ln, x, y + i * lineHeight));
    return lines.length * lineHeight;
  }
  function drawPill(ctx, text, x, y, fill, stroke, color){
    const label = String(text || "");
    ctx.font = "800 22px 'Microsoft YaHei', sans-serif";
    const w = Math.min(210, Math.max(74, ctx.measureText(label).width + 34));
    roundRect(ctx, x, y, w, 36, 18);
    ctx.fillStyle = fill;
    ctx.fill();
    ctx.strokeStyle = stroke;
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.fillStyle = color;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(label, x + w / 2, y + 18);
    ctx.textAlign = "left";
    ctx.textBaseline = "alphabetic";
    return w;
  }
  function drawGlowPill(ctx, text, x, y, fill, stroke, color, glow){
    ctx.save();
    ctx.shadowColor = glow || stroke;
    ctx.shadowBlur = 18;
    const w = drawPill(ctx, text, x, y, fill, stroke, color);
    ctx.restore();
    return w;
  }
  function drawParamBadge(ctx, label, grade, x, y){
    const g = String(grade || "B");
    const w = 148;
    const grad = ctx.createLinearGradient(x, y, x + w, y + 42);
    grad.addColorStop(0, "rgba(33,247,255,.24)");
    grad.addColorStop(1, "rgba(255,47,154,.20)");
    ctx.save();
    ctx.shadowColor = g === "S" ? "#ffd447" : "#21f7ff";
    ctx.shadowBlur = g === "S" ? 18 : 12;
    roundRect(ctx, x, y, w, 42, 12);
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.strokeStyle = g === "S" ? "#ffd447" : "#21f7ff";
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.fillStyle = "#dfffff";
    ctx.font = "800 18px 'Microsoft YaHei', sans-serif";
    ctx.textAlign = "left";
    ctx.textBaseline = "middle";
    ctx.fillText(label, x + 14, y + 22);
    ctx.fillStyle = g === "S" ? "#ffe55d" : "#ffffff";
    ctx.font = "900 25px 'Microsoft YaHei', sans-serif";
    ctx.textAlign = "right";
    ctx.fillText(g, x + w - 14, y + 22);
    ctx.restore();
    return w;
  }
  function loadCanvasImage(src){
    return new Promise(resolve => {
      if(!src) return resolve(null);
      let done = false;
      const img = new Image();
      const finish = value => {
        if(done) return;
        done = true;
        resolve(value);
      };
      img.crossOrigin = "anonymous";
      img.onload = () => finish(img);
      img.onerror = () => finish(null);
      img.src = src;
      setTimeout(() => finish(null), 4500);
    });
  }
  function drawCoverImage(ctx, img, x, y, w, h, r){
    if(!img) return false;
    const scale = Math.max(w / img.width, h / img.height);
    const sw = w / scale;
    const sh = h / scale;
    const sx = (img.width - sw) / 2;
    const sy = (img.height - sh) / 2;
    ctx.save();
    roundRect(ctx, x, y, w, h, r);
    ctx.clip();
    try{
      ctx.drawImage(img, sx, sy, sw, sh, x, y, w, h);
    }catch(e){
      ctx.restore();
      return false;
    }
    ctx.restore();
    return true;
  }
  function drawAvatarFallback(ctx, x, y, w, h, label){
    const g = ctx.createLinearGradient(x, y, x + w, y + h);
    g.addColorStop(0, "#102b46");
    g.addColorStop(1, "#3a1137");
    roundRect(ctx, x, y, w, h, 18);
    ctx.fillStyle = g;
    ctx.fill();
    ctx.strokeStyle = "#21f7ff";
    ctx.lineWidth = 3;
    ctx.stroke();
    ctx.fillStyle = "#dfffff";
    ctx.font = "900 22px 'Microsoft YaHei', sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(label.slice(0,2) || "喵喵", x + w / 2, y + h / 2);
    ctx.textAlign = "left";
    ctx.textBaseline = "alphabetic";
  }
  function canvasToBlob(canvas){
    return new Promise(resolve => canvas.toBlob(resolve, "image/png"));
  }
  function downloadBlob(blob, filename){
    if(!blob) return;
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 1200);
  }
  async function copyBlob(blob){
    if(!blob || !navigator.clipboard || !window.ClipboardItem) return false;
    try{
      await navigator.clipboard.write([new ClipboardItem({"image/png": blob})]);
      return true;
    }catch(e){
      return false;
    }
  }
  function drawCustomerSchedule(ctx, rows, images, d, width, height){
    ctx.clearRect(0,0,width,height);
    const bg = ctx.createLinearGradient(0,0,width,height);
    bg.addColorStop(0, "#080712");
    bg.addColorStop(.48, "#12091f");
    bg.addColorStop(1, "#061523");
    ctx.fillStyle = bg;
    ctx.fillRect(0,0,width,height);
    ctx.strokeStyle = "rgba(33,247,255,.12)";
    ctx.lineWidth = 1;
    for(let y=0; y<height; y+=42){
      ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(width,y); ctx.stroke();
    }
    for(let x=0; x<width; x+=42){
      ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,height); ctx.stroke();
    }
    ctx.strokeStyle = "#ff2f9a";
    ctx.lineWidth = 6;
    roundRect(ctx, 12, 12, width - 24, height - 24, 28);
    ctx.stroke();

    ctx.fillStyle = "#21f7ff";
    ctx.font = "900 24px 'Microsoft YaHei', sans-serif";
    ctx.fillText("NEKO MIAOMIAO / DONA DONA SHIFT", 50, 66);
    ctx.fillStyle = "#fff";
    ctx.shadowColor = "#ff2f9a";
    ctx.shadowBlur = 16;
    ctx.font = "900 52px 'Microsoft YaHei', sans-serif";
    ctx.fillText("今日出勤", 50, 128);
    ctx.shadowBlur = 0;
    ctx.fillStyle = "#ffe55d";
    ctx.font = "900 28px 'Microsoft YaHei', sans-serif";
    ctx.fillText(d, 50, 170);
    drawGlowPill(ctx, `${rows.length} 人出勤`, width - 260, 58, "#1b0b2b", "#21f7ff", "#dfffff", "#21f7ff");

    let y = 220;
    rows.forEach((row, idx) => {
      const cardX = 38;
      const cardW = width - 76;
      const cardH = 246;
      const cg = ctx.createLinearGradient(cardX, y, cardX + cardW, y + cardH);
      cg.addColorStop(0, "rgba(255,47,154,.30)");
      cg.addColorStop(.45, "rgba(25,12,38,.96)");
      cg.addColorStop(1, "rgba(8,9,24,.98)");
      ctx.save();
      ctx.shadowColor = "rgba(255,47,154,.45)";
      ctx.shadowBlur = 16;
      roundRect(ctx, cardX, y, cardW, cardH, 18);
      ctx.fillStyle = cg;
      ctx.fill();
      ctx.restore();
      ctx.strokeStyle = "#ff2f9a";
      ctx.lineWidth = 3;
      ctx.stroke();
      ctx.fillStyle = "#ff2f9a";
      roundRect(ctx, cardX, y, 12, cardH, 6);
      ctx.fill();

      const imgX = cardX + 24;
      const imgY = y + 22;
      const imgSize = 180;
      if(!drawCoverImage(ctx, images[idx], imgX, imgY, imgSize, imgSize, 16)){
        drawAvatarFallback(ctx, imgX, imgY, imgSize, imgSize, row.name);
      }
      ctx.save();
      ctx.shadowColor = "#21f7ff";
      ctx.shadowBlur = 16;
      ctx.strokeStyle = "#21f7ff";
      ctx.lineWidth = 3;
      roundRect(ctx, imgX, imgY, imgSize, imgSize, 16);
      ctx.stroke();
      ctx.restore();

      const textX = imgX + imgSize + 26;
      ctx.fillStyle = "#21f7ff";
      ctx.font = "900 18px 'Microsoft YaHei', sans-serif";
      ctx.fillText(`ID ${String(idx + 1).padStart(3,"0")}`, textX, y + 34);
      ctx.fillStyle = "#fff";
      ctx.shadowColor = "#ff2f9a";
      ctx.shadowBlur = 8;
      ctx.font = "900 36px 'Microsoft YaHei', sans-serif";
      drawText(ctx, row.name, textX, y + 78, 390, 38, 1);
      ctx.shadowBlur = 0;
      ctx.fillStyle = "#f7b8d7";
      ctx.font = "700 22px 'Microsoft YaHei', sans-serif";
      drawText(ctx, row.remark || "欢迎预约", textX, y + 116, 410, 28, 2);

      const rightX = width - 366;
      ctx.fillStyle = "#dfffff";
      ctx.font = "900 27px 'Microsoft YaHei', sans-serif";
      ctx.fillText(`${row.start} ~ ${row.end}`, rightX, y + 50);
      ctx.fillStyle = "#ffe55d";
      ctx.font = "900 26px 'Microsoft YaHei', sans-serif";
      ctx.fillText(row.price ? `${yen(row.price)} /h` : "价格咨询", rightX, y + 88);
      const statusW = drawGlowPill(ctx, row.status || "出勤中", rightX, y + 112, "#073044", "#21f7ff", "#dfffff", "#21f7ff");
      drawGlowPill(ctx, row.booking || "预约可", rightX + statusW + 10, y + 112, "#3b092d", "#ff2f9a", "#ffd2e7", "#ff2f9a");

      let tx = textX;
      let ty = y + 158;
      (row.tags || []).slice(0,4).forEach(tag => {
        const w = drawGlowPill(ctx, tag, tx, ty, "rgba(255,47,154,.22)", "#ff2f9a", "#ffffff", "#ff2f9a");
        tx += w + 8;
        if(tx > rightX - 120){
          tx = textX;
          ty += 40;
        }
      });

      const params = {...DEFAULT_PARAMS, ...(row.params || {})};
      const paramX = rightX;
      const paramY = y + 164;
      ctx.fillStyle = "#21f7ff";
      ctx.font = "900 18px 'Microsoft YaHei', sans-serif";
      ctx.shadowColor = "#21f7ff";
      ctx.shadowBlur = 10;
      ctx.fillText("属性 PARAMETER", paramX, paramY);
      ctx.shadowBlur = 0;
      PARAM_KEYS.forEach(([param,label], i) => {
        const px = paramX + (i % 2) * 158;
        const py = paramY + 14 + Math.floor(i / 2) * 50;
        drawParamBadge(ctx, label, params[param], px, py);
      });
      y += cardH + 24;
    });
    ctx.fillStyle = "#69faff";
    ctx.font = "800 20px 'Microsoft YaHei', sans-serif";
    ctx.textAlign = "center";
    ctx.fillText("预约请确认当日空档", width / 2, height - 42);
    ctx.textAlign = "left";
  }
  window.generateCustomerImage = async function(){
    saveDay();
    const rows = shiftImageRows();
    if(!rows.length){
      alert("请先加入出勤女孩");
      return;
    }
    statusLine.textContent = "正在生成客人图...";
    const d = shiftDate.value || today;
    const width = 1080;
    const height = 300 + rows.length * 270 + 76;
    const canvas = document.createElement("canvas");
    canvas.width = width;
    canvas.height = height;
    const ctx = canvas.getContext("2d");
    const images = await Promise.all(rows.map(row => loadCanvasImage(row.image)));
    drawCustomerSchedule(ctx, rows, images, d, width, height);
    const blob = await canvasToBlob(canvas);
    if(!blob){
      alert("图片生成失败");
      statusLine.textContent = "图片生成失败";
      return;
    }
    customerImageBlob = blob;
    customerImageFilename = `neko-shift-${d}.png`;
    customerImagePreview.src = URL.createObjectURL(blob);
    customerImagePanel.hidden = false;
    customerImageInfo.textContent = `${d} 客人出勤图已生成`;
    const copied = await copyBlob(blob);
    downloadBlob(blob, customerImageFilename);
    statusLine.textContent = copied ? "客人图已生成并复制，也已下载。" : "客人图已生成并下载。";
  };
  window.copyCustomerImage = async function(){
    if(!customerImageBlob){
      await generateCustomerImage();
      return;
    }
    const copied = await copyBlob(customerImageBlob);
    statusLine.textContent = copied ? "图片已复制。" : "当前浏览器不支持直接复制图片，请使用下载PNG。";
  };
  window.downloadCustomerImage = function(){
    if(!customerImageBlob){
      generateCustomerImage();
      return;
    }
    downloadBlob(customerImageBlob, customerImageFilename || `neko-shift-${shiftDate.value || today}.png`);
  };
  window.loadNekoProfiles = async function(){
    statusLine.textContent = "正在读取喵喵资料...";
    try{
      const r = await fetch("/api/neko_profiles?v=" + Date.now(), {cache:"no-store", headers:authHeaders()});
      const data = await r.json();
      if(!data.ok) throw new Error(data.error || "读取失败");
      profiles = data.profiles || [];
      statusLine.textContent = `已读取 ${profiles.length} 个喵喵资料｜来源 ${data.source || ""}`;
      render();
    }catch(e){
      console.error(e);
      statusLine.textContent = "读取失败";
      shiftList.innerHTML = '<div class="empty">读取喵喵资料失败，请确认已登录管理员并且后端能访问喵喵网站。</div>';
    }
  };
  shiftDate.value = today;
  shiftDate.addEventListener("change",()=>{loadDay();render();});
  window.addEventListener("DOMContentLoaded",()=>{loadDay();loadNekoProfiles();});
})();
</script>
