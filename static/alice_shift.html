<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DONA DONA 人材 LIST | Alice Shift</title>
<style>
:root{
  --bg:#080712;
  --panel:#150b22;
  --panel2:#21102d;
  --ink:#f9efff;
  --muted:#b8a7c9;
  --pink:#ff2f9a;
  --pink2:#ff78bf;
  --cyan:#21f7ff;
  --yellow:#ffd447;
  --red:#ff3d72;
  --line:rgba(255,47,154,.82);
  --dimline:rgba(255,47,154,.32);
}
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  font-family:"Yu Gothic UI","Microsoft YaHei",system-ui,sans-serif;
  color:var(--ink);
  background:
    linear-gradient(90deg,rgba(33,247,255,.05) 1px,transparent 1px),
    linear-gradient(rgba(255,47,154,.06) 1px,transparent 1px),
    radial-gradient(circle at 12% 8%,rgba(255,47,154,.24),transparent 24%),
    radial-gradient(circle at 88% 12%,rgba(33,247,255,.18),transparent 22%),
    #070611;
  background-size:48px 48px,48px 48px,100% 100%,100% 100%,100% 100%;
  padding:6px;
}
button,input,select{
  font:inherit;
  outline:none;
}
.shell{
  min-height:calc(100vh - 12px);
  border:2px solid var(--pink);
  border-radius:18px;
  overflow:hidden;
  background:linear-gradient(180deg,rgba(12,9,25,.96),rgba(8,7,18,.98));
  box-shadow:0 0 0 1px rgba(33,247,255,.2),0 0 28px rgba(255,47,154,.22);
}
.topbar{
  display:grid;
  grid-template-columns:minmax(260px,1fr) auto auto;
  align-items:center;
  gap:14px;
  min-height:52px;
  padding:10px 18px;
  border-bottom:1px solid rgba(33,247,255,.65);
  background:linear-gradient(90deg,#201127,#0d1020 60%,#1b0d25);
}
.brand{
  display:flex;
  align-items:center;
  gap:14px;
  min-width:0;
}
.bolt{
  color:var(--cyan);
  text-shadow:2px 0 var(--pink),-2px 0 var(--yellow);
  font-size:24px;
  font-weight:900;
}
.brand h1{
  margin:0;
  font-size:24px;
  line-height:1;
  letter-spacing:0;
  color:#fff;
  text-shadow:3px 0 var(--cyan),-3px 0 var(--pink),0 0 12px rgba(255,47,154,.85);
  white-space:nowrap;
}
.capsule{
  justify-self:center;
  border:1px solid var(--cyan);
  border-radius:999px;
  padding:8px 18px;
  color:#d8fbff;
  background:rgba(33,247,255,.08);
  font-weight:900;
  letter-spacing:2px;
  box-shadow:inset 0 0 12px rgba(33,247,255,.18);
  white-space:nowrap;
}
.tabs{
  display:flex;
  gap:8px;
  justify-content:flex-end;
}
.tab-btn,.neon-btn{
  border:1px solid var(--pink);
  color:#08111a;
  background:linear-gradient(#ffe86b,#ffac25);
  padding:9px 16px;
  border-radius:8px;
  font-weight:900;
  cursor:pointer;
  box-shadow:0 0 0 1px rgba(255,47,154,.4),0 4px 0 #b44500;
}
.tab-btn.on{
  background:linear-gradient(#61ffff,#00d7ff);
  box-shadow:0 0 0 1px rgba(33,247,255,.7),0 4px 0 #0077a3;
}
.subhead{
  display:grid;
  grid-template-columns:minmax(230px,1fr) auto;
  gap:12px;
  align-items:end;
  padding:14px 20px 8px;
  border-bottom:1px dashed var(--dimline);
}
.subhead h2{
  margin:0;
  font-size:25px;
  color:#ffd2e7;
  text-shadow:0 0 12px rgba(255,47,154,.75);
}
.subhead h2::before,.subhead h2::after{
  content:"▼";
  color:var(--pink);
  font-size:16px;
  margin:0 14px 0 6px;
}
.subhead h2::after{margin:0 6px 0 14px}
.subcode{
  color:var(--cyan);
  font-weight:900;
  letter-spacing:2px;
  font-size:12px;
}
.toolbar{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  align-items:center;
  padding:14px 16px 10px;
}
.tool-group{
  display:flex;
  align-items:center;
  gap:8px;
  padding:7px;
  border:1px solid rgba(255,212,71,.75);
  border-radius:10px;
  background:rgba(255,212,71,.08);
}
.field,.selectish{
  border:1px solid var(--cyan);
  border-radius:8px;
  min-height:34px;
  padding:8px 10px;
  color:#f8fdff;
  background:#0b2436;
  font-weight:900;
  box-shadow:inset 0 0 10px rgba(33,247,255,.14);
}
.field::placeholder{color:#7bcbd3}
.date-field{width:150px}
.girl-picker{position:relative;min-width:250px}
.girl-picker .field{width:100%}
.suggest{
  position:absolute;
  z-index:20;
  left:0;
  right:0;
  top:42px;
  display:none;
  max-height:260px;
  overflow:auto;
  border:1px solid var(--cyan);
  border-radius:8px;
  background:#090818;
  box-shadow:0 18px 36px rgba(0,0,0,.5),0 0 18px rgba(33,247,255,.28);
}
.suggest div{
  display:flex;
  justify-content:space-between;
  gap:10px;
  padding:9px 10px;
  cursor:pointer;
  border-bottom:1px dashed rgba(33,247,255,.18);
  font-weight:900;
}
.suggest div:hover{background:rgba(255,47,154,.18)}
.count-box{
  display:flex;
  align-items:center;
  gap:9px;
  color:#ffe894;
  font-weight:900;
}
.count-num{
  min-width:62px;
  text-align:center;
  border:1px solid var(--cyan);
  border-radius:7px;
  padding:7px 16px;
  color:#fff;
  background:#09253a;
}
.statusline{
  color:var(--cyan);
  font-size:12px;
  font-weight:900;
}
.list{
  display:flex;
  flex-direction:column;
  gap:8px;
  padding:8px 16px 12px;
}
.person-card{
  display:grid;
  grid-template-columns:96px minmax(250px,1.2fr) minmax(170px,.65fr) minmax(290px,1.1fr) minmax(260px,.95fr) 86px;
  gap:8px;
  align-items:center;
  min-height:92px;
  padding:8px;
  border:2px solid var(--pink);
  border-radius:12px;
  background:linear-gradient(90deg,rgba(255,47,154,.28),rgba(25,12,38,.96) 32%,rgba(11,9,24,.98));
  box-shadow:inset 5px 0 0 var(--pink),0 0 16px rgba(255,47,154,.18);
}
.avatar-box{
  height:74px;
  border:2px solid var(--cyan);
  border-radius:9px;
  overflow:hidden;
  background:linear-gradient(145deg,#13273b,#2b1840);
  display:flex;
  align-items:center;
  justify-content:center;
  color:#d6fbff;
  font-size:11px;
  font-weight:900;
  text-align:center;
  line-height:1.45;
  box-shadow:inset 0 0 16px rgba(33,247,255,.25);
}
.avatar-box img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}
.id-badge{
  display:inline-block;
  border:1px solid var(--cyan);
  border-radius:5px;
  color:var(--cyan);
  background:#020b14;
  padding:2px 7px;
  font-size:10px;
  font-weight:900;
}
.name-row{
  display:flex;
  align-items:center;
  gap:8px;
  margin:6px 0 5px;
  min-width:0;
}
.name{
  min-width:0;
  color:#fff;
  font-size:19px;
  font-weight:900;
  text-shadow:2px 0 var(--pink),0 0 12px rgba(255,255,255,.34);
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.remark{
  min-height:28px;
  border:1px dashed var(--dimline);
  border-radius:6px;
  padding:6px 8px;
  color:#f7b8d7;
  background:rgba(255,47,154,.12);
  font-size:12px;
  line-height:1.35;
  overflow:hidden;
}
.stack{
  display:grid;
  gap:7px;
}
.time-row,.price-row{
  min-height:30px;
  border:1px solid var(--cyan);
  border-radius:8px;
  padding:5px 10px;
  background:#0b273a;
  color:#dfffff;
  font-weight:900;
}
.price-row{
  border-color:#d2aa20;
  color:#ffe55d;
  background:rgba(255,212,71,.16);
}
.mini-select{
  width:100%;
  min-width:0;
  border:1px solid var(--pink);
  border-radius:999px;
  padding:4px 28px 4px 10px;
  color:#fff;
  background:#2b0a23;
  font-size:12px;
  font-weight:900;
}
.matrix-title{
  color:var(--cyan);
  font-size:11px;
  font-weight:900;
  letter-spacing:1px;
  margin-bottom:3px;
}
.tag-grid,.param-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:6px;
}
.param-line{
  display:grid;
  grid-template-columns:42px 1fr;
  align-items:center;
  gap:5px;
  color:#ff9bcc;
  font-size:12px;
  font-weight:900;
}
.side-actions{
  display:grid;
  gap:6px;
}
.pill-btn{
  border:1px solid var(--pink);
  border-radius:8px;
  padding:7px 8px;
  color:#080712;
  background:linear-gradient(#5dffff,#03d9ff);
  font-size:12px;
  font-weight:900;
  cursor:pointer;
}
.pill-btn.danger{
  color:#fff;
  background:#4b0b36;
}
.empty{
  min-height:240px;
  border:1px dashed var(--dimline);
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#ffaad4;
  font-weight:900;
}
.table-card{
  margin:6px 16px 18px;
  padding:10px;
  border:1px solid var(--dimline);
  border-radius:10px;
  background:rgba(255,47,154,.07);
}
.table-head{
  display:flex;
  justify-content:space-between;
  gap:12px;
  align-items:center;
  color:#dffcff;
  font-weight:900;
  margin-bottom:8px;
}
.copy-bar{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  justify-content:flex-end;
}
.small-btn{
  border:1px solid var(--cyan);
  border-radius:7px;
  padding:7px 10px;
  color:#dfffff;
  background:#10243b;
  font-size:12px;
  font-weight:900;
  cursor:pointer;
}
.small-btn.primary{border-color:var(--pink);background:#4a1234}
@media(max-width:1120px){
  .person-card{
    grid-template-columns:82px 1fr;
  }
  .side-actions{grid-template-columns:repeat(3,minmax(0,1fr));grid-column:1 / -1}
  .tag-grid,.param-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
}
@media(max-width:720px){
  body{padding:0}
  .shell{border-radius:0;min-height:100vh}
  .topbar,.subhead{grid-template-columns:1fr}
  .capsule{justify-self:start}
  .brand h1{font-size:20px;white-space:normal}
  .toolbar{align-items:stretch}
  .girl-picker,.field,.selectish{width:100%;min-width:0}
  .person-card{grid-template-columns:1fr}
  .avatar-box{height:180px}
}
</style>
</head>
<body>
<div class="shell">
  <header class="topbar">
    <div class="brand"><span class="bolt">↯</span><h1>DONA DONA 人材 LIST</h1><span class="bolt">↯</span></div>
    <div class="capsule">ALICE ACADEMY / CYBER SHIFT</div>
    <div class="tabs">
      <button class="tab-btn on" type="button">人材</button>
      <button class="tab-btn" type="button">出勤</button>
    </div>
  </header>

  <section class="subhead">
    <h2>横向き人材出勤表</h2>
    <div class="subcode">TAG / STATUS / AVATAR / PARAMETER</div>
  </section>

  <section class="toolbar">
    <input id="shiftDate" class="field date-field" type="date">
    <div class="girl-picker">
      <input id="girlSearch" class="field" placeholder="搜索人材名字...">
      <div id="girlSuggest" class="suggest"></div>
    </div>
    <select id="startSelect" class="selectish"></select>
    <select id="endSelect" class="selectish"></select>
    <button class="neon-btn" id="addShiftBtn" type="button" onclick="addShift()">＋ 新增人材</button>
    <button class="neon-btn" type="button" onclick="removeLast()">－ 删除最后一个</button>
    <div class="tool-group">
      <span class="count-box">出勤人数 <span id="shiftCount" class="count-num">0</span></span>
    </div>
    <button class="small-btn primary" type="button" onclick="syncNekoProfiles()">同步喵喵基础资料</button>
    <button class="small-btn" type="button" onclick="loadGirls()">刷新</button>
    <button class="small-btn" type="button" onclick="copyShiftText()">复制通报</button>
    <button class="small-btn" type="button" onclick="clearAll()">清空当日</button>
    <span class="statusline" id="avatarStatus"></span>
  </section>

  <main class="list" id="shiftList"></main>

  <section class="table-card">
    <div class="table-head">
      <span>当前列表</span>
      <div class="copy-bar">
        <button class="small-btn" type="button" onclick="copyShiftText()">复制文本</button>
        <button class="small-btn" type="button" onclick="window.print()">打印 / 保存 PDF</button>
      </div>
    </div>
    <div id="dataTable"></div>
  </section>
</div>

<script>
(function(){
  const today = new Date().toISOString().slice(0,10);
  const DONA_TAGS = ["好色","巨乳","小恶魔","辣妹","纯洁","顺从","新人","运动部","积极","清楚","双马尾","萝莉","病娇","敏感","安穏","M气质","S气质","心理病"];
  const STATUS_OPTIONS = ["出勤中","待机中","休息前","夜出勤"];
  const BOOKING_OPTIONS = ["预约可","预约满","不可约"];
  const PARAM_KEYS = [
    ["mind","心灵"],
    ["body","身材"],
    ["face","颜值"],
    ["tech","技巧"]
  ];
  const GRADES = ["S","A","B","C"];
  const DEFAULT_PARAMS = {mind:"B", body:"S", face:"A", tech:"A"};
  let girls = [];
  let shifts = [];
  let girlAvatars = {};
  let selectedGirl = "";

  window.yen = function(n){ return "¥" + Math.round(Number(n||0)).toLocaleString(); };
  function escapeHtml(v){ return String(v ?? "").replace(/[&<>"]/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m])); }
  function jsStr(v){ return String(v ?? "").replace(/\\/g,"\\\\").replace(/'/g,"\\'"); }
  function cleanText(v){ return String(v || "").replace(/\s+/g," ").trim(); }
  function splitTags(text){ return String(text||"").replace(/[;；,，、|/]+/g," ").split(/\s+/).map(x=>x.trim()).filter(Boolean).slice(0,4); }

  function normalizeTime(t){
    t = String(t || "").trim();
    const m = t.match(/^(\d{1,2})(?::(\d{1,2}))?$/);
    if(!m) return t || "24:00";
    let h = Number(m[1]), min = Number(m[2] || 0);
    if(h >= 0 && h <= 5) h += 24;
    return String(h).padStart(2,"0") + ":" + String(min).padStart(2,"0");
  }
  function displayTime(t){
    const nt = normalizeTime(t);
    const m = nt.match(/^(\d{1,2}):(\d{2})$/);
    if(!m) return nt;
    return `${String(Number(m[1])).padStart(2,"0")}:${m[2]}`;
  }
  function displayTimeRange(start,end){ return `${displayTime(start)} ~ ${displayTime(end)}`; }
  function timeOptions(selected){
    selected = normalizeTime(selected);
    let out = "";
    for(let h=12; h<=29; h++){
      for(const m of [0,30]){
        const v = String(h).padStart(2,"0") + ":" + String(m).padStart(2,"0");
        out += `<option value="${v}" ${v===selected?"selected":""}>${displayTime(v)}</option>`;
      }
    }
    return out;
  }
  function apiHeaders(){
    const auth = JSON.parse(localStorage.getItem("alice_auth")||"null");
    return {"Content-Type":"application/json", ...(auth ? {"X-Alice-Role":auth.role} : {})};
  }
  function getGirlByName(name){ return girls.find(g => String(g.name||"") === String(name||"")); }
  function getGirlPrice(name){ return Number(getGirlByName(name)?.list_price || 0); }
  function getGirlRemark(name){ return cleanText(getGirlByName(name)?.remark || getGirlByName(name)?.remark2 || ""); }
  function currentGirl(){ return getGirlByName(selectedGirl || girlSearch.value); }
  function defaultTagsFor(name){
    const g = getGirlByName(name);
    const remembered = window.girlTagMemory && window.girlTagMemory[name];
    const fromMemory = splitTags(remembered || g?.tags || "");
    return [...fromMemory, ...DONA_TAGS].filter((x,i,a)=>x && a.indexOf(x)===i).slice(0,4);
  }
  function safeParams(params){
    if(params && typeof params === "object"){
      return {...DEFAULT_PARAMS, ...params};
    }
    if(typeof params === "string" && params.trim()){
      try{ return {...DEFAULT_PARAMS, ...JSON.parse(params)}; }catch(e){}
    }
    return {...DEFAULT_PARAMS};
  }
  function avatarFor(name){
    const row = girlAvatars[String(name || "").trim()];
    return row && row.avatar_url ? row.avatar_url + "?v=" + encodeURIComponent(row.updated_at || "") : "";
  }
  function renderAvatar(name){
    const url = avatarFor(name);
    if(url) return `<div class="avatar-box"><img src="${escapeHtml(url)}" alt=""></div>`;
    return `<div class="avatar-box">点击下方按钮<br>追加喵喵头像<br><span style="font-size:10px;color:#9befff">头像追加</span></div>`;
  }
  function currentShiftNames(){
    const names = [];
    const seen = new Set();
    rowsForDate().forEach(s => {
      const n = String(s.girl || "").trim();
      if(n && !seen.has(n)){ seen.add(n); names.push(n); }
    });
    if(!names.length){
      girls.forEach(g => {
        const n = String(g.name || "").trim();
        if(n && !seen.has(n)){ seen.add(n); names.push(n); }
      });
    }
    return names;
  }
  async function loadGirlAvatars(){
    const names = currentShiftNames();
    const qs = names.length ? "?names=" + encodeURIComponent(names.join(",")) : "";
    const r = await fetch("/api/girl_avatars" + qs + (qs ? "&" : "?") + "v=" + Date.now(), {cache:"no-store", headers:apiHeaders()});
    const data = await r.json();
    if(data.ok) girlAvatars = data.avatars || {};
  }
  window.syncNekoProfiles = async function(){
    avatarStatus.textContent = "同步中：只取名字 / 备注 / 价格 / 第一张图片...";
    try{
      const r = await fetch("/api/neko_profiles/sync", {method:"POST", headers:apiHeaders(), body:JSON.stringify({})});
      const data = await r.json();
      if(!data.ok) throw new Error(data.error || "同步失败");
      await loadGirls();
      avatarStatus.textContent = `已同步 ${data.updated || 0} 个，图片 ${data.avatars || 0} 张`;
    }catch(e){
      console.error(e);
      avatarStatus.textContent = "同步失败";
      alert(e.message || "同步失败");
    }
  };
  window.syncNekoAvatars = window.syncNekoProfiles;

  async function loadPureShifts(autocopy=false){
    const d = shiftDate.value || today;
    const r = await fetch(`/api/pure_shifts?date=${encodeURIComponent(d)}&autocopy=${autocopy?1:0}&v=${Date.now()}`, {cache:"no-store", headers:apiHeaders()});
    const data = await r.json();
    if(!data.ok) throw new Error(data.error || "读取出勤失败");
    shifts = (data.shifts || []).map(x => ({
      id:x.id,
      date:x.date,
      girl:x.girl,
      start:normalizeTime(x.start || "19:00"),
      end:normalizeTime(x.end || "23:00"),
      tags:splitTags(x.tags || ""),
      status:x.status || "出勤中",
      booking:x.booking || "预约可",
      params:safeParams(x.params),
      source:x.source || "manual"
    }));
    window.girlTagMemory = data.girl_tags || {};
    await loadGirlAvatars().catch(e => console.warn("load avatars failed", e));
    render();
  }
  async function saveShiftToDb(shift){
    const payload = {
      id:shift.id,
      date:shift.date,
      girl:shift.girl,
      start:shift.start,
      end:shift.end,
      tags:(shift.tags||[]).join(" "),
      status:shift.status || "出勤中",
      booking:shift.booking || "预约可",
      params:safeParams(shift.params)
    };
    const r = await fetch("/api/pure_shifts", {method:"POST", headers:apiHeaders(), body:JSON.stringify(payload)});
    const data = await r.json();
    if(!data.ok) throw new Error(data.error || "保存失败");
    return data.id;
  }
  window.loadGirls = async function(){
    try{
      const r = await fetch("/api/all?v=" + Date.now(), {cache:"no-store", headers:apiHeaders()});
      const data = await r.json();
      girls = data.girls || [];
      girlSuggest.style.display = "none";
      await loadPureShifts(false);
    }catch(e){
      console.error(e);
      alert("读取女孩表 / 出勤失败，请确认后端正在运行，并已登录账号。");
    }
  };
  window.addShift = async function(){
    const girlName = selectedGirl || girlSearch.value.trim();
    if(!girlName){ alert("请先选择人材"); return; }
    const shift = {
      id:"",
      source:"manual",
      date:shiftDate.value || today,
      girl:girlName,
      start:normalizeTime(startSelect.value),
      end:normalizeTime(endSelect.value),
      tags:defaultTagsFor(girlName),
      status:"出勤中",
      booking:"预约可",
      params:{...DEFAULT_PARAMS}
    };
    try{
      shift.id = await saveShiftToDb(shift);
      shifts.push(shift);
      selectedGirl = "";
      girlSearch.value = "";
      render();
    }catch(e){ console.error(e); alert(e.message || "保存失败"); }
  };
  window.removeLast = async function(){
    const d = shiftDate.value || today;
    const last = shifts.filter(s => s.date===d).at(-1);
    if(last) await deleteShift(last.id);
  };
  window.deleteShift = async function(id){
    try{
      const r = await fetch("/api/pure_shifts/delete", {method:"POST", headers:apiHeaders(), body:JSON.stringify({id})});
      const data = await r.json();
      if(!data.ok) throw new Error(data.error || "删除失败");
      shifts = shifts.filter(s => String(s.id) !== String(id));
      render();
    }catch(e){ console.error(e); alert(e.message || "删除失败"); }
  };
  window.clearAll = async function(){
    const d = shiftDate.value || today;
    if(!confirm("确认清空当前日期的人材出勤表？")) return;
    try{
      const r = await fetch("/api/pure_shifts/clear", {method:"POST", headers:apiHeaders(), body:JSON.stringify({date:d})});
      const data = await r.json();
      if(!data.ok) throw new Error(data.error || "清空失败");
      shifts = shifts.filter(s => s.date !== d);
      render();
    }catch(e){ console.error(e); alert(e.message || "清空失败"); }
  };
  function rowsForDate(){
    const d = shiftDate.value || today;
    return shifts.filter(s => s.date === d);
  }
  function selectOptions(values, selected){
    return values.map(v=>`<option value="${escapeHtml(v)}" ${String(v)===String(selected)?"selected":""}>${escapeHtml(v)}</option>`).join("");
  }
  function tagSelect(rowIndex, tagIndex, selected){
    return `<select class="mini-select" onchange="updateShiftTag(${rowIndex},${tagIndex},this.value)">${selectOptions(DONA_TAGS, selected || DONA_TAGS[tagIndex] || DONA_TAGS[0])}</select>`;
  }
  function paramSelect(rowIndex, key, selected){
    return `<select class="mini-select" onchange="updateShiftParam(${rowIndex},'${key}',this.value)">${selectOptions(GRADES, selected || DEFAULT_PARAMS[key] || "B")}</select>`;
  }
  function renderRow(s, i){
    const p = getGirlPrice(s.girl);
    const tags = [...(s.tags || [])];
    while(tags.length < 4) tags.push(DONA_TAGS[tags.length] || DONA_TAGS[0]);
    const params = safeParams(s.params);
    const remark = getGirlRemark(s.girl) || "备注未填写";
    return `<article class="person-card">
      ${renderAvatar(s.girl)}
      <section>
        <span class="id-badge">ID ${String(i + 1).padStart(3,"0")}</span>
        <div class="name-row"><span class="name">${escapeHtml(s.girl)}</span></div>
        <div class="remark">${escapeHtml(remark).slice(0,90)}</div>
      </section>
      <section class="stack">
        <div class="time-row">
          <select class="mini-select" onchange="updateShiftField(${i},'start',this.value)">${timeOptions(s.start)}</select>
          <select class="mini-select" style="margin-top:5px" onchange="updateShiftField(${i},'end',this.value)">${timeOptions(s.end)}</select>
        </div>
        <div class="price-row">${p > 0 ? `${yen(p)} /h` : "¥0 /h"}</div>
      </section>
      <section>
        <div class="matrix-title">TAG</div>
        <div class="tag-grid">${tags.map((t,idx)=>tagSelect(i,idx,t)).join("")}</div>
      </section>
      <section>
        <div class="matrix-title">PARAMETER</div>
        <div class="param-grid">${PARAM_KEYS.map(([key,label])=>`<div class="param-line"><span>${label}</span>${paramSelect(i,key,params[key])}</div>`).join("")}</div>
      </section>
      <section class="side-actions">
        <select class="pill-btn" onchange="updateShiftField(${i},'status',this.value)">${selectOptions(STATUS_OPTIONS, s.status)}</select>
        <select class="pill-btn" onchange="updateShiftField(${i},'booking',this.value)">${selectOptions(BOOKING_OPTIONS, s.booking)}</select>
        <button class="pill-btn danger" type="button" onclick="deleteShift('${jsStr(s.id)}')">删除</button>
      </section>
    </article>`;
  }
  function renderTable(){
    const rows = rowsForDate();
    if(!rows.length){ dataTable.innerHTML = '<div class="empty">这一天还没有出勤数据</div>'; return; }
    dataTable.innerHTML = rows.map((s,i)=>{
      const params = safeParams(s.params);
      return `<div style="display:grid;grid-template-columns:60px 1fr 150px 1fr 1fr 90px;gap:8px;padding:7px 0;border-bottom:1px dashed rgba(255,47,154,.25);font-size:12px">
        <b>ID ${String(i+1).padStart(3,"0")}</b>
        <span>${escapeHtml(s.girl)}</span>
        <span>${escapeHtml(displayTimeRange(s.start,s.end))}</span>
        <span>${escapeHtml((s.tags||[]).join(" / "))}</span>
        <span>心${params.mind} 身${params.body} 颜${params.face} 技${params.tech}</span>
        <span>${escapeHtml(s.status || "")}</span>
      </div>`;
    }).join("");
  }
  function render(){
    const rows = rowsForDate();
    shiftCount.textContent = rows.length;
    shiftList.innerHTML = rows.length ? rows.map(renderRow).join("") : '<div class="empty">选择人材后点击“新增人材”，这里会生成多娜多娜风格横向出勤表。</div>';
    renderTable();
  }
  async function saveRowByIndex(i){
    const row = rowsForDate()[i];
    if(!row) return;
    try{
      row.id = await saveShiftToDb(row);
      window.girlTagMemory = window.girlTagMemory || {};
      window.girlTagMemory[row.girl] = (row.tags||[]).join(" ");
      avatarStatus.textContent = "已保存";
      setTimeout(()=>{ if(avatarStatus.textContent === "已保存") avatarStatus.textContent = ""; }, 1200);
    }catch(e){
      console.error(e);
      avatarStatus.textContent = "保存失败";
      alert(e.message || "保存失败");
    }
  }
  window.updateShiftField = async function(i, field, value){
    const row = rowsForDate()[i];
    if(!row) return;
    if(field === "start" || field === "end") row[field] = normalizeTime(value);
    else row[field] = value;
    render();
    await saveRowByIndex(i);
  };
  window.updateShiftTag = async function(i, tagIndex, value){
    const row = rowsForDate()[i];
    if(!row) return;
    row.tags = [...(row.tags || [])];
    row.tags[tagIndex] = value;
    row.tags = row.tags.filter(Boolean).slice(0,4);
    render();
    await saveRowByIndex(i);
  };
  window.updateShiftParam = async function(i, key, value){
    const row = rowsForDate()[i];
    if(!row) return;
    row.params = safeParams(row.params);
    row.params[key] = value;
    render();
    await saveRowByIndex(i);
  };
  function renderGirlSuggest(keyword=""){
    const box = girlSuggest;
    keyword = String(keyword||"").trim().toLowerCase();
    const rows = girls.filter(g => !keyword || String(g.name||"").toLowerCase().includes(keyword)).slice(0,80);
    if(!rows.length){ box.style.display="none"; return; }
    box.innerHTML = rows.map(g=>`<div onclick="chooseGirl('${jsStr(g.name)}')"><span>${escapeHtml(g.name)}</span><span>${yen(g.list_price||0)}</span></div>`).join("");
    box.style.display = "block";
  }
  window.chooseGirl = function(name){
    selectedGirl = name;
    girlSearch.value = name;
    girlSuggest.style.display = "none";
  };
  function weekdayCN(dateStr){
    const ds=["周日","周一","周二","周三","周四","周五","周六"];
    const d = new Date(dateStr+"T00:00:00");
    return isNaN(d.getTime()) ? "" : ds[d.getDay()];
  }
  function buildCopyText(){
    const d = shiftDate.value || today;
    const rows = rowsForDate();
    let out = `${d.replaceAll("-","").slice(4)}${weekdayCN(d)}出勤\n\n`;
    rows.forEach(s=>{
      const p = getGirlPrice(s.girl);
      const tags = (s.tags || []).map(t=>`【${t}】`).join("");
      const params = safeParams(s.params);
      out += `${s.girl}${tags} ${s.status || ""} ${s.booking || ""}\n`;
      out += `${displayTimeRange(s.start,s.end)}  ${p > 0 ? Math.round(p/1000) + "000/h" : "¥0"}\n`;
      out += `心${params.mind} 身${params.body} 颜${params.face} 技${params.tech}\n`;
      const remark = getGirlRemark(s.girl);
      if(remark) out += `${remark}\n`;
      out += "\n";
    });
    return out.trim();
  }
  window.copyShiftText = async function(){
    try{ await navigator.clipboard.writeText(buildCopyText()); alert("已复制出勤文本"); }
    catch(e){ console.error(e); alert("复制失败"); }
  };

  shiftDate.value = today;
  startSelect.innerHTML = timeOptions("18:00");
  endSelect.innerHTML = timeOptions("23:00");
  shiftDate.addEventListener("change", ()=>loadPureShifts(true));
  window.addEventListener("DOMContentLoaded", async()=>{
    await loadGirls();
    girlSearch.addEventListener("input", e=>{ selectedGirl = e.target.value; renderGirlSuggest(e.target.value); });
    girlSearch.addEventListener("focus", ()=>renderGirlSuggest(girlSearch.value));
    document.addEventListener("click", e=>{
      if(!e.target.closest(".girl-picker")) girlSuggest.style.display="none";
    });
  });
})();
</script>
</body>
</html>
