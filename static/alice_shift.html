<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>爱丽丝学院 · 纯出勤表</title>
<style>
:root{
  --poster-text:#00d9ff;
  --poster-scale:1;
  --pink:#ff8fc7;
  --pink2:#ffd8ea;
  --lav:#d9c8ff;
  --blue:#dff5ff;
  --ink:#5d4566;
  --line:#f0c6dc;
  --paper:#fffafd;
  --danger:#ff6e92;
}
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  font-family:"Yu Gothic UI","Microsoft YaHei",system-ui,sans-serif;
  color:var(--ink);
  background:
    radial-gradient(circle at 12% 8%,rgba(255,255,255,.9) 0 5%,transparent 6%),
    linear-gradient(135deg,#fff7fb,#f4edff 48%,#eaf8ff);
  padding:18px;
}
.wrap{max-width:1280px;margin:0 auto}
.hero{
  border:3px solid var(--line);
  border-radius:30px;
  padding:18px 22px;
  background:linear-gradient(135deg,var(--pink),var(--lav));
  color:white;
  box-shadow:0 12px 28px #ff8fc755;
  margin-bottom:16px;
}
.hero h1{margin:0;font-size:30px;letter-spacing:.04em}
.hero p{margin:8px 0 0;font-weight:700;opacity:.95}
.card{
  background:rgba(255,255,255,.94);
  border:2px solid var(--line);
  border-radius:26px;
  padding:16px;
  margin-bottom:14px;
  box-shadow:0 10px 24px #b68bac1f;
}
.toolbar{
  display:grid;
  grid-template-columns:1.2fr 1.2fr 1fr 1fr 1fr 1.6fr auto auto;
  gap:10px;
}
input,select,button{
  border:2px solid var(--line);
  border-radius:15px;
  padding:10px 12px;
  background:white;
  color:var(--ink);
  outline:none;
  font-weight:700;
}
button{cursor:pointer;font-weight:900}
.primary{border:0;background:linear-gradient(135deg,var(--pink),#ffb4d9);color:white}
.soft{background:white}
.danger{border:0;background:var(--danger);color:white}
.note{font-size:calc(13px * var(--poster-scale));opacity:.82;line-height:1.6}
.count{
  font-size:16px;
  font-weight:900;
  color:#e75ca2;
}
.preview{
  width:300px;
  min-height:600px;
  margin:0 auto;
  background:
    linear-gradient(rgba(255,255,255,.08),rgba(255,255,255,.08)),
    var(--poster-bg, linear-gradient(135deg,#ffe9f4,#f3eaff,#eaf8ff));
  background-size:cover;
  background-position:center;
  border:0;
  border-radius:0;
  padding:18px 16px;
  overflow:hidden;
  position:relative;
  box-shadow:0 12px 30px #0002;
}
.preview-title{
  text-align:left;
  font-size:calc(14px * var(--poster-scale));
  line-height:1.15;
  font-weight:900;
  color:var(--poster-text);
  text-shadow:0 1px 2px #004b60,0 0 6px #ffffff99;
  letter-spacing:.02em;
  margin-bottom:2px;
}
.preview-sub{
  text-align:left;
  margin:0 0 8px;
  font-size:10px;
  color:var(--poster-text);
  font-weight:900;
  text-shadow:0 1px 2px #004b60,0 0 6px #ffffff99;
}
.shift-list{
  display:flex;
  flex-direction:column;
  gap:8px;
  align-items:stretch;
}

.shift-card{
  width:100%;
  min-height:auto;
  border:0;
  border-radius:0;
  padding:0;
  background:transparent;
  box-shadow:none;
  position:relative;
}
.shift-name{
  font-size:calc(13px * var(--poster-scale));
  line-height:1.25;
  font-weight:900;
  color:var(--poster-text);
  padding-right:0;
  text-shadow:0 1px 2px #004b60,0 0 6px #ffffffaa;
}
.shift-row{
  margin-top:2px;
  font-size:calc(13px * var(--poster-scale));
  line-height:1.15;
  font-weight:900;
  color:var(--poster-text);
  text-shadow:0 1px 2px #004b60,0 0 6px #ffffffaa;
}
.time-price-line{
  display:flex;
  justify-content:space-between;
  gap:8px;
  font-size:calc(13px * var(--poster-scale));
  line-height:1.15;
  font-weight:900;
  color:var(--poster-text);
  text-shadow:0 1px 2px #004b60,0 0 6px #ffffffaa;
}
.price{font-size:calc(13px * var(--poster-scale));font-weight:900;color:var(--poster-text)}
.tag-wrap{display:flex;flex-wrap:wrap;gap:4px;margin-top:2px}
.tag{
  display:inline-block;
  padding:2px 5px;
  border-radius:999px;
  background:linear-gradient(135deg,#fff0f7,#f2eaff);
  border:1px solid #f0c6dc;
  color:#e75ca2;
  font-size:calc(12px * var(--poster-scale));
  font-weight:900;
}
.gold-tag{
  display:inline-block;
  padding:4px 10px;
  border-radius:999px;
  background:linear-gradient(120deg,#5a4300,#ffd95e,#fff4b0,#d8a500,#5a4300);
  background-size:300% 300%;
  color:#fff8d6;
  border:1px solid #ffd95e;
  font-size:12px;
  font-weight:900;
  box-shadow:0 0 12px #ffd95e88;
  animation:goldFlow 3s linear infinite;
}
@keyframes goldFlow{
  0%{background-position:0% 50%}
  100%{background-position:100% 50%}
}
.del{display:none}
.empty{
  width:100%;
  text-align:center;
  padding:34px 10px;
  color:var(--poster-text);
  font-size:16px;
  font-weight:900;
  text-shadow:0 1px 2px #004b60,0 0 6px #ffffffaa;
}
.table{
  overflow:auto;border:2px solid var(--line);border-radius:18px;background:white;
}
table{border-collapse:collapse;width:100%;min-width:760px}
th,td{border:1px solid #f1cfe0;padding:8px;font-size:13px;white-space:nowrap}
th{background:#fff0f7}

.modal-mask{
  position:fixed; inset:0; background:rgba(0,0,0,.38); z-index:2000;
  display:none; align-items:center; justify-content:center; padding:18px;
}
.modal{
  width:min(560px,100%); background:white; border:3px solid var(--line); border-radius:26px;
  padding:18px; box-shadow:0 20px 60px #0004;
}
.modal h3{margin:0 0 12px;color:#e75ca2}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-grid label{font-size:13px;font-weight:900;color:var(--ink)}
.form-grid input,.form-grid select{width:100%;margin-top:5px}
.price-pill{display:inline-block;padding:10px 12px;border:2px solid var(--line);border-radius:15px;background:#fff8fb;font-weight:900;color:#e75ca2}
@media(max-width:640px){.form-grid{grid-template-columns:1fr}}

@media(max-width:980px){
  .toolbar{grid-template-columns:1fr}
  .shift-list{grid-template-columns:repeat(2,minmax(0,1fr))}
}
@media(max-width:640px){
  .shift-list{grid-template-columns:1fr}
}
@media print{
  body{background:white;padding:0}
  .no-print{display:none!important}
  .wrap{max-width:none}
  .preview{border:0;box-shadow:none}
}
</style>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>
<body>
<div class="wrap">
  <div class="hero no-print">
    <h1>🎀 ALICE ACADEMY · SHIFT LIST 🎀</h1>
    <p>纯出勤表页面｜日期做标题｜女孩表下拉｜价格 1万～3万｜TAG 可手动编辑</p>
  </div>

  <div class="card no-print">
    <h2>出勤录入</h2>
    <p class="note">当前列表只显示选定日期；女孩价格强制读取女孩表“定价”，没有定价显示 0；编辑用弹框修改，截图实时同步。</p>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px">
      <button class="soft" onclick="setPresetBg('pink')">粉色学院背景</button>
      <button class="soft" onclick="setPresetBg('night')">夜色背景</button>
      <button class="soft" onclick="setPresetBg('gold')">金色背景</button>
      <button class="soft" onclick="setPresetBg('blue')">蓝色清爽背景</button>
      <button class="soft" onclick="setPresetBg('clear')">清除背景</button>
      <input type="file" id="bgUpload" accept="image/*" style="max-width:220px">
    </div>
    <div class="toolbar">
      <input id="shiftDate" type="date">
      <div style="position:relative">
<input id="girlSearch" placeholder="搜索女孩名字...">
<div id="girlSuggest" style="position:absolute;left:0;right:0;top:48px;background:white;border:2px solid #f0c6dc;border-radius:16px;max-height:260px;overflow:auto;z-index:999;display:none;box-shadow:0 10px 24px #0001"></div>
</div>
      <select id="startSelect"></select>
      <select id="endSelect"></select>
      <input id="fontSizeRange" type="range" min="14" max="36" value="20" title="字体大小">
      <input id="bgSizeRange" type="range" min="80" max="180" value="100" title="背景缩放">
      <select id="priceSelect"></select>
      <select id="tagInput">
<option value="女孩">女孩</option>
<option value="筛选">筛选</option>
<option value="新人">新人</option>
<option value="推荐">推荐</option>
<option value="可预约">可预约</option>
<option value="王牌">王牌</option>
</select><input id="goldTagInput" placeholder="金色TAG 例：TOP 回归 王牌">
      <button class="primary" id="addShiftBtn" onclick="addShift()">＋ 新增</button>
      <button class="danger" onclick="removeLast()">－ 删除最后</button>
    </div>
    <div style="margin-top:12px;display:flex;gap:10px;flex-wrap:wrap;align-items:center">
      <span class="count">出勤人数：<span id="shiftCount">0</span></span>
      <button class="soft" onclick="clearAll()">清空全部</button>
      <button class="soft" onclick="scrollToPreview()">定位截图区</button>
      <button class="soft" onclick="window.print()">打印 / 保存PDF</button><button class="primary" onclick="copyShiftText()">一键复制文本</button><button class="primary" onclick="captureShift()">一键截图</button>
      <button class="soft" onclick="loadGirls()">刷新女孩表</button>
    </div>
  </div>

  <div class="card no-print">
    <h2>当前列表</h2>
    <div id="dataTable"></div>

    <div id="editModalMask" class="modal-mask">
      <div class="modal">
        <h3>编辑当前出勤</h3>
        <div class="form-grid">
          <label>女孩
            <select id="editGirlSelect" onchange="syncEditPrice()"></select>
          </label>
          <label>定价
            <div id="editPriceShow" class="price-pill">¥0</div>
          </label>
          <label>开始时间
            <select id="editStartSelect"></select>
          </label>
          <label>结束时间
            <select id="editEndSelect"></select>
          </label>
          <label>第一个TAG
            <select id="editTagSelect"><option value="女孩">女孩</option><option value="新人">新人</option><option value="推荐">推荐</option><option value="可预约">可预约</option><option value="王牌">王牌</option><option value="筛选">筛选</option></select>
          </label>
          <label>金色TAG
            <input id="editGoldTagInput" placeholder="例：TOP 回归 王牌">
          </label>
        </div>
        <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:16px">
          <button class="soft" onclick="closeEditModal()">取消</button>
          <button class="primary" onclick="saveEditModal()">保存修改</button>
        </div>
      </div>
    </div>
  </div>

  <div class="preview" id="previewBox">
    <div class="preview-title"><span id="posterTitle"></span></div>
    <div class="preview-sub"><span id="previewDateText"></span> ｜ 出勤人数 <span id="previewCount">0</span></div>
    <div class="shift-list" id="shiftList"></div>
  </div>
</div>

<script>
(function(){
  const today = new Date().toISOString().slice(0,10);
  let girls = [];
  let shifts = [];
  let selectedGirl = "";
  let editingShiftId = null;

  window.yen = function(n){ return "¥" + Math.round(Number(n||0)).toLocaleString(); };

  function escapeHtml(v){
    return String(v ?? "").replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
  }
  function jsStr(v){ return String(v ?? "").replace(/\\/g,"\\\\").replace(/'/g,"\\'"); }

  function normalizeTime(t){
    t = String(t || "").trim();
    const m = t.match(/^(\d{1,2})(?::(\d{1,2}))?$/);
    if(!m) return t || "24:00";
    let h = Number(m[1]), min = Number(m[2] || 0);
    if(h >= 0 && h <= 5) h += 24;
    return String(h).padStart(2,"0") + ":" + String(min).padStart(2,"0");
  }

  function displayTime(t){
    const nt = normalizeTime(t);
    const m = nt.match(/^(\d{1,2}):(\d{2})$/);
    if(!m) return nt;
    const h = Number(m[1]);
    const mm = m[2];
    const showH = h >= 24 ? h - 24 : h;
    return mm === "00" ? `${showH}点` : `${showH}点${mm}分`;
  }

  function timeOptions(selected){
    selected = normalizeTime(selected);
    let out = "";
    for(let h=12; h<=29; h++){
      for(const m of [0,30]){
        const v = String(h).padStart(2,"0") + ":" + String(m).padStart(2,"0");
        out += `<option value="${v}" ${v===selected?"selected":""}>${displayTime(v)}</option>`;
      }
    }
    return out;
  }

  function splitTags(text){
    return String(text||"").split(/[,\s，、]+/).map(x=>x.trim()).filter(Boolean);
  }

  function getGirlByName(name){
    return girls.find(g => String(g.name||"") === String(name||""));
  }
  function getGirlPrice(name){
    const g = getGirlByName(name);
    return Number(g?.list_price || 0);
  }
  function currentGirl(){ return getGirlByName(selectedGirl || girlSearch.value); }

  function priceOptions(selected=""){
    const p = Number(selected || 0);
    if(p <= 0) return `<option value="0" selected>¥0（女孩表未设置定价）</option>`;
    return `<option value="${p}" selected>${yen(p)}</option>`;
  }

  function refreshPriceBySelectedGirl(){
    const p = Number(currentGirl()?.list_price || 0);
    priceSelect.innerHTML = priceOptions(p);
  }

  function applyPreviewStyle(){
    const scale = Number(fontSizeRange?.value || 20) / 20;
    const bg = Number(bgSizeRange?.value || 100);
    document.documentElement.style.setProperty("--poster-scale", String(scale));
    previewBox.style.backgroundSize = bg + "% auto";
  }

  window.loadGirls = async function(){
    try{
      const auth = JSON.parse(localStorage.getItem("alice_auth")||"null");
      const headers = auth ? {"X-Alice-Role":auth.role} : {};
      const r = await fetch("/api/all?v=" + Date.now(), {cache:"no-store", headers});
      const data = await r.json();
      girls = data.girls || [];
      const imported = (data.schedules||[])
        .filter(x => String(x.status||"出勤") === "出勤")
        .map(x => ({
          id:"room_"+x.id,
          date:x.schedule_date,
          girl:x.girl_name,
          start:normalizeTime(x.start_time || "24:00"),
          end:normalizeTime(x.end_time || "28:00"),
          tags:["女孩"],
          goldTags:String(x.note||"").includes("房间安排自动生成") ? ["房间"] : [],
          source:"schedule"
        }));
      const manual = shifts.filter(x => x.source === "manual");
      shifts = [...imported, ...manual];
      renderGirlSelect();
      refreshPriceBySelectedGirl();
      render();
    }catch(e){
      console.error(e);
      alert("读取女孩表/房间安排失败，请确认主系统后端正在运行，并已登录管理员账号。");
    }
  };

  function renderGirlSelect(){ renderGirlSuggest(""); }

  window.addShift = function(){
    const girlName = selectedGirl || girlSearch.value.trim();
    if(!girlName){ alert("请先选择女孩"); return; }
    shifts.push({
      id:"manual_" + Date.now() + "_" + Math.random(),
      source:"manual",
      date:shiftDate.value || today,
      girl:girlName,
      start:normalizeTime(startSelect.value),
      end:normalizeTime(endSelect.value),
      tags:[tagInput.value || "女孩"],
      goldTags:splitTags(goldTagInput.value)
    });
    goldTagInput.value = "";
    tagInput.value = "女孩";
    render();
    scrollToPreview();
  };

  window.removeLast = function(){
    const d = shiftDate.value || today;
    const idx = shifts.map((s,i)=>[s,i]).filter(([s])=>s.date===d).map(([,i])=>i).pop();
    if(idx !== undefined) shifts.splice(idx,1);
    render();
  };
  window.deleteShift = function(id){ shifts = shifts.filter(s => String(s.id) !== String(id)); render(); };
  window.clearAll = function(){
    const d = shiftDate.value || today;
    if(!confirm("确认清空当前日期的出勤表？")) return;
    shifts = shifts.filter(s => s.date !== d);
    render();
  };
  window.scrollToPreview = function(){ previewBox.scrollIntoView({behavior:"smooth", block:"start"}); };

  function rowsForDate(){
    const d = shiftDate.value || today;
    return shifts.filter(s => s.date === d);
  }

  function renderTable(){
    const rows = rowsForDate();
    if(!rows.length){ dataTable.innerHTML = '<div class="note">当前日期还没有出勤数据。房间安排录入后会显示在这里。</div>'; return; }
    let h = '<div class="table"><table><thead><tr><th>女孩</th><th>时间</th><th>定价</th><th>第一个TAG</th><th>金色TAG</th><th>来源</th><th>操作</th></tr></thead><tbody>';
    rows.forEach(s=>{
      h += `<tr>
        <td>${escapeHtml(s.girl)}</td>
        <td>${escapeHtml(displayTime(s.start))} - ${escapeHtml(displayTime(s.end))}</td>
        <td>${yen(getGirlPrice(s.girl))}</td>
        <td>${escapeHtml((s.tags||[])[0] || "女孩")}</td>
        <td>${escapeHtml((s.goldTags||[]).join(" / "))}</td>
        <td>${s.source === "manual" ? "手动新增" : "房间安排"}</td>
        <td><button class="soft" onclick="openEditModal('${jsStr(s.id)}')">编辑</button> <button class="danger" onclick="deleteShift('${jsStr(s.id)}')">删除</button></td>
      </tr>`;
    });
    dataTable.innerHTML = h + "</tbody></table></div>";
  }

  function renderTags(tags,goldTags){
    const normal = (tags||[]).map(t=>`<span class="tag">${escapeHtml(t)}</span>`).join("");
    const gold = (goldTags||[]).map(t=>`<span class="gold-tag">${escapeHtml(t)}</span>`).join("");
    return normal || gold ? `<div class="tag-wrap">${gold}${normal}</div>` : "";
  }

  function renderPreview(){
    const d = shiftDate.value || today;
    const rows = rowsForDate();
    posterTitle.textContent = `${d.replaceAll("-","").slice(4)}${weekdayCN(d)}出勤`;
    previewDateText.textContent = "";
    previewCount.textContent = rows.length;
    shiftCount.textContent = rows.length;
    if(!rows.length){ shiftList.innerHTML = '<div class="empty">这一天还没有出勤数据</div>'; return; }
    shiftList.innerHTML = rows.map(s=>{
      const p = getGirlPrice(s.girl);
      const priceText = p > 0 ? `<span>${yen(p)} /h</span>` : `<span>¥0</span>`;
      return `<div class="shift-card"><div class="shift-name">${escapeHtml(s.girl)}${renderTags(s.tags,s.goldTags)}</div><div class="time-price-line"><span>${escapeHtml(displayTime(s.start))} - ${escapeHtml(displayTime(s.end))}</span>${priceText}</div></div>`;
    }).join("");
  }

  function renderGirlSuggest(keyword=""){
    const box = girlSuggest;
    keyword = String(keyword||"").trim().toLowerCase();
    const rows = girls.filter(g => !keyword || String(g.name||"").toLowerCase().includes(keyword));
    if(!rows.length){ box.style.display="none"; return; }
    box.innerHTML = rows.map(g=>`<div onclick="chooseGirl('${jsStr(g.name)}')" style="padding:10px 12px;cursor:pointer;border-bottom:1px solid #f7d7e6;font-weight:800">🎀 ${escapeHtml(g.name)} <span style="float:right;color:#e75ca2">${yen(g.list_price||0)}</span></div>`).join("");
    box.style.display = "block";
  }
  window.chooseGirl = function(name){
    selectedGirl = name;
    girlSearch.value = name;
    girlSuggest.style.display = "none";
    refreshPriceBySelectedGirl();
  };

  function girlSelectOptions(selected){
    return girls.map(g=>`<option value="${escapeHtml(g.name)}" ${String(g.name)===String(selected)?"selected":""}>${escapeHtml(g.name)}｜${yen(g.list_price||0)}</option>`).join("");
  }
  window.openEditModal = function(id){
    const s = shifts.find(x => String(x.id) === String(id));
    if(!s) return;
    editingShiftId = s.id;
    editGirlSelect.innerHTML = girlSelectOptions(s.girl);
    editStartSelect.innerHTML = timeOptions(s.start);
    editEndSelect.innerHTML = timeOptions(s.end);
    editTagSelect.value = (s.tags||[])[0] || "女孩";
    editGoldTagInput.value = (s.goldTags||[]).join(" ");
    syncEditPrice();
    editModalMask.style.display = "flex";
  };
  window.syncEditPrice = function(){ editPriceShow.textContent = yen(getGirlPrice(editGirlSelect.value)); };
  window.closeEditModal = function(){ editModalMask.style.display = "none"; editingShiftId = null; };
  window.saveEditModal = function(){
    const s = shifts.find(x => String(x.id) === String(editingShiftId));
    if(!s) return closeEditModal();
    s.girl = editGirlSelect.value;
    s.start = normalizeTime(editStartSelect.value);
    s.end = normalizeTime(editEndSelect.value);
    s.tags = [editTagSelect.value || "女孩"];
    s.goldTags = splitTags(editGoldTagInput.value);
    closeEditModal();
    render();
  };

  window.setPresetBg = function(type){
    const bgs = {
      pink:"linear-gradient(135deg,rgba(255,210,235,.72),rgba(235,220,255,.72)), radial-gradient(circle at 50% 35%,#ffffff55 0 18%,transparent 19%), linear-gradient(160deg,#ff9ccc,#d9c8ff)",
      night:"linear-gradient(135deg,rgba(20,10,30,.68),rgba(45,15,60,.55)), radial-gradient(circle at 70% 18%,#ffffff77 0 8%,transparent 9%), linear-gradient(160deg,#1a0d2d,#5b1a55,#111827)",
      gold:"linear-gradient(135deg,rgba(80,40,0,.52),rgba(255,220,120,.45)), radial-gradient(circle at 40% 25%,#fff0aa99 0 16%,transparent 17%), linear-gradient(160deg,#6c4300,#d19b22,#fff2b0)",
      blue:"linear-gradient(135deg,rgba(160,235,255,.58),rgba(230,245,255,.55)), radial-gradient(circle at 60% 25%,#ffffffaa 0 18%,transparent 19%), linear-gradient(160deg,#b8f0ff,#dff5ff,#f7fbff)"
    };
    if(type === "clear") previewBox.style.removeProperty("--poster-bg");
    else previewBox.style.setProperty("--poster-bg", bgs[type]);
  };

  window.captureShift = async function(){
    try{
      applyPreviewStyle();
      const canvas = await html2canvas(previewBox,{backgroundColor:null,scale:3,useCORS:true});
      canvas.toBlob(blob=>{
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url; a.download = "alice_shift.png"; a.click(); URL.revokeObjectURL(url);
      },"image/png");
    }catch(e){ console.error(e); alert("截图失败，请确认浏览器允许下载。"); }
  };

  function weekdayCN(dateStr){
    const ds=["周日","周一","周二","周三","周四","周五","周六"];
    const d = new Date(dateStr+"T00:00:00");
    return isNaN(d.getTime()) ? "" : ds[d.getDay()];
  }
  function buildCopyText(){
    const d = shiftDate.value || today;
    const rows = rowsForDate();
    let out = `${d.replaceAll("-","").slice(4)}${weekdayCN(d)}出勤\n\n`;
    rows.forEach(s=>{
      const tags = (s.tags||[]).map(t=>`（${t}）`).join("");
      const gold = (s.goldTags||[]).map(t=>`【${t}】`).join("");
      const p = getGirlPrice(s.girl);
      out += `${gold}${s.girl}${tags}\n`;
      out += p > 0 ? `${displayTime(s.start)}-${displayTime(s.end)}             ${Math.round(p/1000)}000/h\n\n` : `${displayTime(s.start)}-${displayTime(s.end)}             ¥0\n\n`;
    });
    out += "https://ailisi99.com/";
    return out;
  }
  window.copyShiftText = async function(){
    try{ await navigator.clipboard.writeText(buildCopyText()); alert("已复制出勤文本"); }
    catch(e){ console.error(e); alert("复制失败"); }
  };

  function render(){ applyPreviewStyle(); renderTable(); renderPreview(); }

  shiftDate.value = today;
  startSelect.innerHTML = timeOptions("19:00");
  endSelect.innerHTML = timeOptions("23:00");
  priceSelect.innerHTML = priceOptions(0);
  tagInput.value = "女孩";
  shiftDate.addEventListener("change", render);

  window.addEventListener("DOMContentLoaded", async()=>{
    await loadGirls();
    girlSearch.addEventListener("input", e=>{ selectedGirl = e.target.value; renderGirlSuggest(e.target.value); refreshPriceBySelectedGirl(); });
    girlSearch.addEventListener("focus", ()=>renderGirlSuggest(girlSearch.value));
    bgUpload.addEventListener("change", e=>{
      const file = e.target.files && e.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = ev => { previewBox.style.setProperty("--poster-bg", `url("${ev.target.result}")`); applyPreviewStyle(); };
      reader.readAsDataURL(file);
    });
    fontSizeRange.addEventListener("input", render);
    bgSizeRange.addEventListener("input", applyPreviewStyle);
    document.addEventListener("click", e=>{
      if(!e.target.closest("#girlSuggest") && e.target.id !== "girlSearch") girlSuggest.style.display="none";
      if(e.target === editModalMask) closeEditModal();
    });
    render();
  });
})();
</script>
</body>
</html>
