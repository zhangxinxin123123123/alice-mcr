<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>爱丽丝学院 · 纯出勤表</title>
<style>
:root{
  --poster-text:#00d9ff;
  --poster-scale:1;
  --pink:#ff8fc7;
  --pink2:#ffd8ea;
  --lav:#d9c8ff;
  --blue:#dff5ff;
  --ink:#5d4566;
  --line:#f0c6dc;
  --paper:#fffafd;
  --danger:#ff6e92;
}
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  font-family:"Yu Gothic UI","Microsoft YaHei",system-ui,sans-serif;
  color:var(--ink);
  background:
    radial-gradient(circle at 12% 8%,rgba(255,255,255,.9) 0 5%,transparent 6%),
    linear-gradient(135deg,#fff7fb,#f4edff 48%,#eaf8ff);
  padding:18px;
}
.wrap{max-width:1280px;margin:0 auto}
.hero{
  border:3px solid var(--line);
  border-radius:30px;
  padding:18px 22px;
  background:linear-gradient(135deg,var(--pink),var(--lav));
  color:white;
  box-shadow:0 12px 28px #ff8fc755;
  margin-bottom:16px;
}
.hero h1{margin:0;font-size:30px;letter-spacing:.04em}
.hero p{margin:8px 0 0;font-weight:700;opacity:.95}
.card{
  background:rgba(255,255,255,.94);
  border:2px solid var(--line);
  border-radius:26px;
  padding:16px;
  margin-bottom:14px;
  box-shadow:0 10px 24px #b68bac1f;
}
.toolbar{
  display:grid;
  grid-template-columns:1.2fr 1.2fr 1fr 1fr 1fr 1.6fr auto auto;
  gap:10px;
}
input,select,button{
  border:2px solid var(--line);
  border-radius:15px;
  padding:10px 12px;
  background:white;
  color:var(--ink);
  outline:none;
  font-weight:700;
}
button{cursor:pointer;font-weight:900}
.primary{border:0;background:linear-gradient(135deg,var(--pink),#ffb4d9);color:white}
.soft{background:white}
.danger{border:0;background:var(--danger);color:white}
.mode-btn.active{border:0;background:linear-gradient(135deg,#0bbff2,#63dff7);color:white}
.note{font-size:calc(13px * var(--poster-scale));opacity:.82;line-height:1.6}
.count{
  font-size:16px;
  font-weight:900;
  color:#e75ca2;
}
.preview{
  width:298px;
  min-height:600px;
  margin:0 auto;
  background:
    linear-gradient(rgba(255,255,255,.08),rgba(255,255,255,.08)),
    var(--poster-bg, linear-gradient(135deg,#ffe9f4,#f3eaff,#eaf8ff));
  background-size:cover;
  background-position:center;
  border:0;
  border-radius:0;
  padding:18px 16px;
  overflow:hidden;
  position:relative;
  box-shadow:0 12px 30px #0002;
}
.preview.mode-default{
  padding:58px 18px 34px;
  background:
    linear-gradient(90deg,rgba(126,162,203,.72) 0 16px,transparent 16px calc(100% - 16px),rgba(126,162,203,.72) calc(100% - 16px)),
    linear-gradient(180deg,rgba(126,162,203,.72) 0 16px,transparent 16px calc(100% - 16px),rgba(126,162,203,.72) calc(100% - 16px)),
    repeating-linear-gradient(45deg,rgba(95,132,179,.18) 0 10px,rgba(255,255,255,.38) 10px 20px),
    radial-gradient(circle at 50% 20%,rgba(255,255,255,.92),rgba(255,250,239,.9) 56%,rgba(248,235,211,.86)),
    linear-gradient(180deg,#d7e7f8,#f8efe1);
  background-size:cover,cover,28px 28px,cover,cover;
  background-position:center;
  border:4px double rgba(179,132,58,.8);
  box-shadow:0 12px 30px rgba(93,67,35,.22), inset 0 0 0 12px rgba(255,255,255,.55), inset 0 0 0 14px rgba(179,132,58,.42);
  font-family:"M PLUS Rounded 1c","Zen Maru Gothic","Microsoft YaHei",sans-serif;
}
.preview.mode-default::before{
  content:"";
  position:absolute;
  inset:20px 20px 26px;
  border:1.5px solid rgba(179,132,58,.55);
  border-radius:22px;
  background:
    radial-gradient(circle at 7% 8%,rgba(180,59,94,.5) 0 9px,transparent 10px),
    radial-gradient(circle at 93% 91%,rgba(180,59,94,.45) 0 12px,transparent 13px),
    linear-gradient(135deg,transparent 0 42px,rgba(126,162,203,.28) 43px 70px,transparent 71px),
    linear-gradient(315deg,transparent 0 44px,rgba(126,162,203,.24) 45px 76px,transparent 77px),
    rgba(255,252,244,.76);
  box-shadow:inset 0 0 0 8px rgba(255,255,255,.46);
  pointer-events:none;
}
.preview.mode-default::after{
  content:"♠   ♥   ♦   ♣";
  position:absolute;
  left:38px;
  right:38px;
  bottom:14px;
  text-align:center;
  color:rgba(157,111,47,.62);
  font-size:14px;
  letter-spacing:4px;
  pointer-events:none;
}
.preview.mode-default > *{position:relative;z-index:1}
.preview-title{
  text-align:left;
  font-size:calc(14px * var(--poster-scale));
  line-height:1.15;
  font-weight:900;
  color:var(--poster-text);
  text-shadow:0 1px 2px #004b60,0 0 6px #ffffff99;
  letter-spacing:.02em;
  margin-bottom:2px;
}
.preview.mode-default .preview-title{
  text-align:center;
  font-size:21px;
  line-height:1.15;
  font-weight:900;
  color:#426f9f;
  -webkit-text-stroke:.45px #fff;
  text-shadow:0 1px 0 #fff,0 2px 4px rgba(132,91,35,.32);
  margin-bottom:2px;
  padding:0 8px;
}
.preview.mode-default .preview-title::before,
.preview.mode-default .preview-title::after{
  content:"";
  display:inline-block;
  width:28px;
  height:12px;
  margin:0 5px 2px;
  border-radius:10px 3px 10px 3px;
  background:linear-gradient(135deg,#8fb4dd,#e7f2ff 48%,#b88a48 50%,#6f9cc8);
  vertical-align:middle;
}
.preview-sub{
  text-align:left;
  margin:0 0 8px;
  font-size:10px;
  color:var(--poster-text);
  font-weight:900;
  text-shadow:0 1px 2px #004b60,0 0 6px #ffffff99;
}
.preview.mode-default .preview-sub{
  text-align:center;
  font-size:12px;
  font-weight:800;
  color:#9b6d2f;
  margin-bottom:9px;
  text-shadow:none;
}
.shift-list{
  display:flex;
  flex-direction:column;
  gap:8px;
  align-items:stretch;
}
.preview.mode-default .shift-list{
  gap:5px;
  padding:0 2px;
}

.shift-card{
  width:100%;
  min-height:auto;
  border:0;
  border-radius:0;
  padding:0;
  background:transparent;
  box-shadow:none;
  position:relative;
}
.preview.mode-default .shift-card{
  padding:5px 7px;
  border:1px solid rgba(184,138,72,.45);
  border-radius:12px;
  background:linear-gradient(90deg,rgba(255,255,255,.82),rgba(255,249,238,.74));
  box-shadow:0 2px 7px rgba(96,65,35,.12);
}
.shift-card-inner{
  display:flex;
  gap:8px;
  align-items:flex-start;
}
.preview.mode-default .shift-card-inner{
  display:grid;
  grid-template-columns:50px minmax(0,1fr);
  column-gap:8px;
  align-items:center;
}
.shift-avatar{
  flex:0 0 calc(44px * var(--poster-scale));
  width:calc(44px * var(--poster-scale));
  height:calc(44px * var(--poster-scale));
  border-radius:50%;
  overflow:hidden;
  border:2px solid rgba(255,255,255,.9);
  box-shadow:0 2px 8px #004b6066;
  background:rgba(255,255,255,.85);
  display:flex;
  align-items:center;
  justify-content:center;
}
.preview.mode-default .shift-avatar{
  flex:0 0 46px;
  width:46px;
  height:46px;
  border:2px solid #fff7e7;
  box-shadow:0 2px 0 rgba(184,138,72,.58),0 4px 9px rgba(45,72,100,.22);
  background:linear-gradient(135deg,#fff,#dcecff);
  outline:1.5px solid rgba(184,138,72,.65);
}
.shift-avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}
.shift-avatar-fallback{
  color:#e75ca2;
  font-size:calc(13px * var(--poster-scale));
  font-weight:900;
  text-shadow:none;
}
.preview.mode-default .shift-avatar-fallback{
  color:#426f9f;
  font-size:14px;
  -webkit-text-stroke:.25px #fff;
}
.shift-copy{min-width:0;flex:1}
.shift-name{
  font-size:calc(13px * var(--poster-scale));
  line-height:1.25;
  font-weight:900;
  color:var(--poster-text);
  padding-right:0;
  text-shadow:0 1px 2px #004b60,0 0 6px #ffffffaa;
}
.preview.mode-default .shift-name{
  font-size:15px;
  line-height:1.1;
  color:#426f9f;
  -webkit-text-stroke:.25px #fff;
  text-shadow:0 1px 0 #fff,0 1px 3px rgba(61,88,125,.28);
  margin-bottom:3px;
  overflow-wrap:anywhere;
}
.shift-row{
  margin-top:2px;
  font-size:calc(13px * var(--poster-scale));
  line-height:1.15;
  font-weight:900;
  color:var(--poster-text);
  text-shadow:0 1px 2px #004b60,0 0 6px #ffffffaa;
}
.time-price-line{
  display:flex;
  justify-content:space-between;
  gap:8px;
  font-size:calc(13px * var(--poster-scale));
  line-height:1.15;
  font-weight:900;
  color:var(--poster-text);
  text-shadow:0 1px 2px #004b60,0 0 6px #ffffffaa;
}
.preview.mode-default .time-price-line{
  align-items:flex-end;
  gap:6px;
  font-size:12px;
  line-height:1.1;
  color:#70512e;
  -webkit-text-stroke:0;
  text-shadow:none;
}
.preview.mode-default .time-price-line span:last-child{white-space:nowrap}
.price{font-size:calc(13px * var(--poster-scale));font-weight:900;color:var(--poster-text)}
.tag-wrap{display:flex;flex-wrap:wrap;gap:4px;margin-top:2px}
.preview.mode-default .tag-wrap{margin:0 0 4px}
.tag{
  display:inline-block;
  padding:2px 5px;
  border-radius:999px;
  background:linear-gradient(135deg,#fff0f7,#f2eaff);
  border:1px solid #f0c6dc;
  color:#e75ca2;
  font-size:calc(12px * var(--poster-scale));
  font-weight:900;
}
.preview.mode-default .tag{
  padding:3px 6px;
  border-radius:999px;
  background:#fff7fb;
  color:#aa496f;
  border:1px solid rgba(184,87,126,.38);
  box-shadow:0 1px 2px rgba(184,87,126,.16);
  font-size:10px;
  line-height:1;
}
.gold-tag{
  display:inline-block;
  padding:4px 10px;
  border-radius:999px;
  background:linear-gradient(120deg,#5a4300,#ffd95e,#fff4b0,#d8a500,#5a4300);
  background-size:300% 300%;
  color:#fff8d6;
  border:1px solid #ffd95e;
  font-size:12px;
  font-weight:900;
  box-shadow:0 0 12px #ffd95e88;
  animation:goldFlow 3s linear infinite;
}
.preview.mode-default .gold-tag{
  padding:3px 6px;
  border-radius:999px;
  background:linear-gradient(135deg,#fff8d9,#e9c878);
  color:#77501e;
  border:1px solid #d3a64e;
  box-shadow:0 1px 2px rgba(210,150,0,.22);
  font-size:10px;
  line-height:1;
  animation:none;
}
@keyframes goldFlow{
  0%{background-position:0% 50%}
  100%{background-position:100% 50%}
}
.del{display:none}
.empty{
  width:100%;
  text-align:center;
  padding:34px 10px;
  color:var(--poster-text);
  font-size:16px;
  font-weight:900;
  text-shadow:0 1px 2px #004b60,0 0 6px #ffffffaa;
}
.preview.mode-default .empty{
  color:#426f9f;
  text-shadow:none;
}
.table{
  overflow:auto;border:2px solid var(--line);border-radius:18px;background:white;
}
table{border-collapse:collapse;width:100%;min-width:760px}
th,td{border:1px solid #f1cfe0;padding:8px;font-size:13px;white-space:nowrap}
th{background:#fff0f7}

.modal-mask{
  position:fixed; inset:0; background:rgba(0,0,0,.38); z-index:2000;
  display:none; align-items:center; justify-content:center; padding:18px;
}
.modal{
  width:min(560px,100%); background:white; border:3px solid var(--line); border-radius:26px;
  padding:18px; box-shadow:0 20px 60px #0004;
}
.modal h3{margin:0 0 12px;color:#e75ca2}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-grid label{font-size:13px;font-weight:900;color:var(--ink)}
.form-grid input,.form-grid select{width:100%;margin-top:5px}
.price-pill{display:inline-block;padding:10px 12px;border:2px solid var(--line);border-radius:15px;background:#fff8fb;font-weight:900;color:#e75ca2}
.avatar-status{font-size:13px;font-weight:900;color:#e75ca2}
@media(max-width:640px){.form-grid{grid-template-columns:1fr}}

@media(max-width:980px){
  .toolbar{grid-template-columns:1fr}
  .shift-list{grid-template-columns:repeat(2,minmax(0,1fr))}
}
@media(max-width:640px){
  .shift-list{grid-template-columns:1fr}
}
@media print{
  body{background:white;padding:0}
  .no-print{display:none!important}
  .wrap{max-width:none}
  .preview{border:0;box-shadow:none}
}
</style>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>
<body>
<div class="wrap">
  <div class="hero no-print">
    <h1>🎀 ALICE ACADEMY · SHIFT LIST 🎀</h1>
    <p>纯出勤表页面｜日期做标题｜女孩表下拉｜价格 1万～3万｜TAG 可手动编辑</p>
  </div>

  <div class="card no-print">
    <h2>出勤录入</h2>
    <p class="note">当前列表只显示选定日期；女孩价格强制读取女孩表“定价”，没有定价显示 0；编辑用弹框修改，截图实时同步。</p>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px">
      <button class="soft mode-btn" id="defaultUiBtn" onclick="setPreviewMode('default')">默认UI</button>
      <button class="soft mode-btn" id="customUiBtn" onclick="setPreviewMode('custom')">自定义UI</button>
      <button class="soft custom-only" onclick="setPresetBg('pink')" hidden>粉色学院背景</button>
      <button class="soft custom-only" onclick="setPresetBg('night')" hidden>夜色背景</button>
      <button class="soft custom-only" onclick="setPresetBg('gold')" hidden>金色背景</button>
      <button class="soft custom-only" onclick="setPresetBg('blue')" hidden>蓝色清爽背景</button>
      <button class="soft custom-only" onclick="setPresetBg('clear')" hidden>清除背景</button>
      <input class="custom-only" type="file" id="bgUpload" accept="image/*" style="max-width:220px" hidden>
    </div>
    <div class="toolbar">
      <input id="shiftDate" type="date">
      <div style="position:relative">
<input id="girlSearch" placeholder="搜索女孩名字...">
<div id="girlSuggest" style="position:absolute;left:0;right:0;top:48px;background:white;border:2px solid #f0c6dc;border-radius:16px;max-height:260px;overflow:auto;z-index:999;display:none;box-shadow:0 10px 24px #0001"></div>
</div>
      <select id="startSelect"></select>
      <select id="endSelect"></select>
      <label class="custom-only" style="font-size:12px;font-weight:900" hidden>字体大小 <input id="fontSizeRange" type="range" min="14" max="36" value="20" title="字体大小"></label>
      <label class="custom-only" style="font-size:12px;font-weight:900" hidden>字体颜色 <input id="fontColorInput" type="color" value="#00d9ff" title="字体颜色"></label>
      <button class="soft custom-only" onclick="setPresetTextColor('cyan')" hidden>青色字</button>
      <button class="soft custom-only" onclick="setPresetTextColor('pink')" hidden>粉色字</button>
      <button class="soft custom-only" onclick="setPresetTextColor('white')" hidden>白色字</button>
      <button class="soft custom-only" onclick="setPresetTextColor('gold')" hidden>金色字</button>
      <label class="custom-only" style="font-size:12px;font-weight:900" hidden>背景缩放 <input id="bgSizeRange" type="range" min="80" max="180" value="100" title="背景缩放"></label>
      <select id="priceSelect"></select>
      <input id="tagInput" placeholder="普通TAG，空格分隔 例：新人 可预约 会喝酒" value="">
      <input id="goldTagInput" placeholder="金色TAG，空格分隔 例：TOP 回归 王牌">
      <button class="primary" id="addShiftBtn" onclick="addShift()">＋ 新增</button>
      <button class="danger" onclick="removeLast()">－ 删除最后</button>
    </div>
    <div style="margin-top:12px;display:flex;gap:10px;flex-wrap:wrap;align-items:center">
      <button class="primary" onclick="syncAliceAvatars()">从爱丽丝更新头像</button>
      <button class="primary" onclick="syncNekoAvatars()">一键更新喵喵头像</button>
      <button class="soft" onclick="syncNekoAvatarsFromAdmin()">后台更新头像</button>
      <span class="avatar-status" id="avatarStatus"></span>
      <span class="count">出勤人数：<span id="shiftCount">0</span></span>
      <button class="soft" onclick="clearAll()">清空全部</button>
      <button class="soft" onclick="scrollToPreview()">定位截图区</button>
      <button class="soft" onclick="window.print()">打印 / 保存PDF</button><button class="primary" onclick="copyShiftText()">一键复制文本</button><button class="primary" onclick="captureShift()">复制图片</button>
      <button class="soft" onclick="loadGirls()">刷新女孩表</button>
    </div>
  </div>

  <div class="card no-print">
    <h2>当前列表</h2>
    <div id="dataTable"></div>

    <div id="editModalMask" class="modal-mask">
      <div class="modal">
        <h3>编辑当前出勤</h3>
        <div class="form-grid">
          <label>女孩
            <select id="editGirlSelect" onchange="syncEditPrice()"></select>
          </label>
          <label>定价
            <div id="editPriceShow" class="price-pill">¥0</div>
          </label>
          <label>开始时间
            <select id="editStartSelect"></select>
          </label>
          <label>结束时间
            <select id="editEndSelect"></select>
          </label>
          <label>普通TAG
            <input id="editTagInput" placeholder="空格分隔 例：新人 可预约 会喝酒">
          </label>
          <label>金色TAG
            <input id="editGoldTagInput" placeholder="例：TOP 回归 王牌">
          </label>
        </div>
        <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:16px">
          <button class="soft" onclick="closeEditModal()">取消</button>
          <button class="primary" onclick="saveEditModal()">保存修改</button>
        </div>
      </div>
    </div>
  </div>

  <div class="preview mode-default" id="previewBox">
    <div class="preview-title"><span id="posterTitle"></span></div>
    <div class="preview-sub"><span id="previewDateText">出勤人数：</span><span id="previewCount">0</span></div>
    <div class="shift-list" id="shiftList"></div>
  </div>
</div>

<script>
(function(){
  const today = new Date().toISOString().slice(0,10);
  let girls = [];
  let shifts = [];
  let girlAvatars = {};
  let selectedGirl = "";
  let editingShiftId = null;
  let previewMode = "default";

  window.yen = function(n){ return "¥" + Math.round(Number(n||0)).toLocaleString(); };

  function escapeHtml(v){
    return String(v ?? "").replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
  }
  function jsStr(v){ return String(v ?? "").replace(/\\/g,"\\\\").replace(/'/g,"\\'"); }

  function normalizeTime(t){
    t = String(t || "").trim();
    const m = t.match(/^(\d{1,2})(?::(\d{1,2}))?$/);
    if(!m) return t || "24:00";
    let h = Number(m[1]), min = Number(m[2] || 0);
    if(h >= 0 && h <= 5) h += 24;
    return String(h).padStart(2,"0") + ":" + String(min).padStart(2,"0");
  }

  function displayTime(t){
    const nt = normalizeTime(t);
    const m = nt.match(/^(\d{1,2}):(\d{2})$/);
    if(!m) return nt;
    const h = Number(m[1]);
    const mm = m[2];
    if(h >= 24){
      const showH = h - 24;
      return mm === "00" ? `凌晨${showH}点` : `凌晨${showH}点${mm}分`;
    }
    return mm === "00" ? `${h}点` : `${h}点${mm}分`;
  }
  function displayTimeRange(start,end){
    return `${displayTime(start)}到${displayTime(end)}`;
  }

  function timeOptions(selected){
    selected = normalizeTime(selected);
    let out = "";
    for(let h=12; h<=29; h++){
      for(const m of [0,30]){
        const v = String(h).padStart(2,"0") + ":" + String(m).padStart(2,"0");
        out += `<option value="${v}" ${v===selected?"selected":""}>${displayTime(v)}</option>`;
      }
    }
    return out;
  }

  function splitTags(text){
    return String(text||"").replace(/[;；]+/g," ").split(/\s+/).map(x=>x.trim()).filter(Boolean);
  }

  function getGirlByName(name){
    return girls.find(g => String(g.name||"") === String(name||""));
  }
  function getGirlPrice(name){
    const g = getGirlByName(name);
    return Number(g?.list_price || 0);
  }
  function currentGirl(){ return getGirlByName(selectedGirl || girlSearch.value); }

  function priceOptions(selected=""){
    const p = Number(selected || 0);
    if(p <= 0) return `<option value="0" selected>¥0（女孩表未设置定价）</option>`;
    return `<option value="${p}" selected>${yen(p)}</option>`;
  }

  function refreshPriceBySelectedGirl(){
    const p = Number(currentGirl()?.list_price || 0);
    priceSelect.innerHTML = priceOptions(p);
  }

  function syncPreviewModeControls(){
    const custom = previewMode === "custom";
    previewBox.classList.toggle("mode-default", !custom);
    previewBox.classList.toggle("mode-custom", custom);
    document.querySelectorAll(".custom-only").forEach(el => { el.hidden = !custom; });
    document.getElementById("defaultUiBtn")?.classList.toggle("active", !custom);
    document.getElementById("customUiBtn")?.classList.toggle("active", custom);
  }

  function applyPreviewStyle(){
    syncPreviewModeControls();
    if(previewMode !== "custom"){
      document.documentElement.style.setProperty("--poster-scale", "1");
      document.documentElement.style.setProperty("--poster-text", "#0bbff2");
      previewBox.style.backgroundSize = "cover";
      return;
    }
    const scale = Number(fontSizeRange?.value || 20) / 20;
    const bg = Number(bgSizeRange?.value || 100);
    const textColor = fontColorInput?.value || "#00d9ff";
    document.documentElement.style.setProperty("--poster-scale", String(scale));
    document.documentElement.style.setProperty("--poster-text", textColor);
    previewBox.style.backgroundSize = bg + "% auto";
  }

  window.setPreviewMode = function(mode){
    previewMode = mode === "custom" ? "custom" : "default";
    render();
  };

  function activateCustomPreview(){
    if(previewMode === "custom") return;
    previewMode = "custom";
    syncPreviewModeControls();
  }
  function apiHeaders(){
    const auth = JSON.parse(localStorage.getItem("alice_auth")||"null");
    return {"Content-Type":"application/json", ...(auth ? {"X-Alice-Role":auth.role,"X-Alice-User":auth.username||"","X-Alice-Session":auth.session_token||""} : {})};
  }

  function currentShiftNames(){
    const names = [];
    const seen = new Set();
    rowsForDate().forEach(s => {
      const n = String(s.girl || "").trim();
      if(n && !seen.has(n)){ seen.add(n); names.push(n); }
    });
    if(!names.length){
      girls.forEach(g => {
        const n = String(g.name || "").trim();
        if(n && !seen.has(n)){ seen.add(n); names.push(n); }
      });
    }
    return names;
  }

  async function loadGirlAvatars(){
    const names = currentShiftNames();
    const qs = names.length ? "?names=" + encodeURIComponent(names.join(",")) : "";
    const r = await fetch("/api/girl_avatars" + qs + (qs ? "&" : "?") + "v=" + Date.now(), {cache:"no-store", headers:apiHeaders()});
    const data = await r.json();
    if(data.ok) girlAvatars = data.avatars || {};
  }

  function avatarFor(name){
    const row = girlAvatars[String(name || "").trim()];
    return row && row.avatar_url ? row.avatar_url + "?v=" + encodeURIComponent(row.updated_at || "") : "";
  }

  function avatarInitial(name){
    const clean = String(name || "").replace(/\s+/g,"").replace(/[（(].*$/, "");
    return escapeHtml(clean.slice(0, 2) || "?");
  }

  function renderAvatar(name){
    const url = avatarFor(name);
    if(url) return `<div class="shift-avatar"><img src="${escapeHtml(url)}" alt=""></div>`;
    return `<div class="shift-avatar"><span class="shift-avatar-fallback">${avatarInitial(name)}</span></div>`;
  }

  async function maybeAutoSyncAliceAvatars(){
    if(!rowsForDate().length) return;
    const names = currentShiftNames();
    if(!names.length) return;
    const key = "alice_shift_alice_avatar_sync_" + today;
    if(localStorage.getItem(key) === "done") return;
    try{
      const ok = await syncAliceAvatars({silent:true});
      if(ok) localStorage.setItem(key, "done");
    }catch(e){
      console.warn("auto sync alice avatars failed", e);
    }
  }

  window.syncAliceAvatars = async function(options){
    options = options || {};
    const names = currentShiftNames();
    if(!names.length){ if(!options.silent) alert("当前没有可更新头像的女孩"); return false; }
    if(!options.silent) avatarStatus.textContent = "正在从爱丽丝更新头像...";
    try{
      const r = await fetch('/api/alice_avatars/sync', {
        method:'POST',
        headers:apiHeaders(),
        body:JSON.stringify({date:shiftDate.value || today, names})
      });
      const data = await r.json();
      if(!data.ok) throw new Error(data.error || "更新失败");
      Object.assign(girlAvatars, data.avatars || {});
      render();
      const ok = (data.results || []).length;
      const miss = (data.missing || []).length;
      const err = (data.errors || []).length;
      if(!options.silent || ok){
        avatarStatus.textContent = `爱丽丝头像已更新 ${ok} 个，未匹配 ${miss} 个${err ? "，失败 " + err + " 个" : ""}`;
      }
      return ok > 0 || miss === 0;
    }catch(e){
      console.error(e);
      if(!options.silent){
        avatarStatus.textContent = "爱丽丝头像更新失败";
        alert(e.message || "爱丽丝头像更新失败");
      }
      return false;
    }
  };

  window.syncNekoAvatarsFromAdmin = async function(){
    const nekoUser = prompt("喵喵后台用户名");
    if(nekoUser === null) return;
    const nekoPassword = prompt("喵喵后台密码");
    if(nekoPassword === null) return;
    await syncNekoAvatars({neko_user:nekoUser, neko_password:nekoPassword});
  };
  window.syncNekoAvatars = async function(adminAuth){
    const names = currentShiftNames();
    if(!names.length){ alert("当前没有可更新头像的女孩"); return; }
    avatarStatus.textContent = "正在更新头像...";
    try{
      const r = await fetch('/api/neko_avatars/sync', {
        method:'POST',
        headers:apiHeaders(),
        body:JSON.stringify({date:shiftDate.value || today, names, ...(adminAuth || {})})
      });
      const data = await r.json();
      if(!data.ok) throw new Error(data.error || "更新失败");
      Object.assign(girlAvatars, data.avatars || {});
      render();
      const ok = (data.results || []).length;
      const miss = (data.missing || []).length;
      const err = (data.errors || []).length;
      avatarStatus.textContent = `已更新 ${ok} 个，未匹配 ${miss} 个${err ? "，失败 " + err + " 个" : ""}`;
    }catch(e){
      console.error(e);
      avatarStatus.textContent = "头像更新失败";
      alert(e.message || "头像更新失败");
    }
  };

  async function loadPureShifts(autocopy=false){
    const d = shiftDate.value || today;
    const r = await fetch(`/api/pure_shifts?date=${encodeURIComponent(d)}&autocopy=${autocopy?1:0}&v=${Date.now()}`, {cache:"no-store", headers:apiHeaders()});
    const data = await r.json();
    if(!data.ok) throw new Error(data.error || "读取纯出勤失败");
    shifts = (data.shifts || []).map(x => ({
      id:x.id,
      date:x.date,
      girl:x.girl,
      start:normalizeTime(x.start || "19:00"),
      end:normalizeTime(x.end || "23:00"),
      tags:splitTags(x.tags || ""),
      goldTags:splitTags(x.goldTags || ""),
      source:x.source || "manual"
    }));
    window.girlTagMemory = data.girl_tags || {};
    await loadGirlAvatars().catch(e => console.warn("load avatars failed", e));
    render();
    maybeAutoSyncAliceAvatars();
  }

  async function saveShiftToDb(shift){
    const payload = {id:shift.id, date:shift.date, girl:shift.girl, start:shift.start, end:shift.end, tags:(shift.tags||[]).join(" "), goldTags:(shift.goldTags||[]).join(" ")};
    const r = await fetch('/api/pure_shifts', {method:'POST', headers:apiHeaders(), body:JSON.stringify(payload)});
    const data = await r.json();
    if(!data.ok) throw new Error(data.error || "保存失败");
    return data.id;
  }

  window.loadGirls = async function(){
    try{
      const r = await fetch("/api/all?v=" + Date.now(), {cache:"no-store", headers:apiHeaders()});
      const data = await r.json();
      girls = data.girls || [];
      renderGirlSelect();
      refreshPriceBySelectedGirl();
      await loadPureShifts(false);
    }catch(e){
      console.error(e);
      alert("读取女孩表/纯出勤失败，请确认后端正在运行，并已登录账号。");
    }
  };

  function renderGirlSelect(){ renderGirlSuggest(""); }

  window.addShift = async function(){
    const girlName = selectedGirl || girlSearch.value.trim();
    if(!girlName){ alert("请先选择女孩"); return; }
    const shift = {
      id:"",
      source:"manual",
      date:shiftDate.value || today,
      girl:girlName,
      start:normalizeTime(startSelect.value),
      end:normalizeTime(endSelect.value),
      tags:splitTags(tagInput.value || ""),
      goldTags:splitTags(goldTagInput.value)
    };
    try{
      shift.id = await saveShiftToDb(shift);
      shifts.push(shift);
      window.girlTagMemory = window.girlTagMemory || {};
      window.girlTagMemory[girlName] = (shift.tags||[]).join(" ");
      goldTagInput.value = "";
      tagInput.value = "";
      render();
      scrollToPreview();
    }catch(e){ console.error(e); alert(e.message || "保存失败"); }
  };

  window.removeLast = async function(){
    const d = shiftDate.value || today;
    const last = shifts.filter(s => s.date===d).at(-1);
    if(last) await deleteShift(last.id);
  };
  window.deleteShift = async function(id){
    try{
      const r = await fetch('/api/pure_shifts/delete', {method:'POST', headers:apiHeaders(), body:JSON.stringify({id})});
      const data = await r.json();
      if(!data.ok) throw new Error(data.error || "删除失败");
      shifts = shifts.filter(s => String(s.id) !== String(id));
      render();
    }catch(e){ console.error(e); alert(e.message || "删除失败"); }
  };
  window.clearAll = async function(){
    const d = shiftDate.value || today;
    if(!confirm("确认清空当前日期的出勤表？")) return;
    try{
      const r = await fetch('/api/pure_shifts/clear', {method:'POST', headers:apiHeaders(), body:JSON.stringify({date:d})});
      const data = await r.json();
      if(!data.ok) throw new Error(data.error || "清空失败");
      shifts = shifts.filter(s => s.date !== d);
      render();
    }catch(e){ console.error(e); alert(e.message || "清空失败"); }
  };
  window.scrollToPreview = function(){ previewBox.scrollIntoView({behavior:"smooth", block:"start"}); };

  function rowsForDate(){
    const d = shiftDate.value || today;
    return shifts.filter(s => s.date === d);
  }

  function renderTable(){
    const rows = rowsForDate();
    if(!rows.length){ dataTable.innerHTML = '<div class="note">当前日期还没有出勤数据。房间安排录入后会显示在这里。</div>'; return; }
    let h = '<div class="table"><table><thead><tr><th>女孩</th><th>时间</th><th>定价</th><th>普通TAG</th><th>金色TAG</th><th>来源</th><th>操作</th></tr></thead><tbody>';
    rows.forEach(s=>{
      h += `<tr>
        <td>${escapeHtml(s.girl)}</td>
        <td>${escapeHtml(displayTimeRange(s.start,s.end))}</td>
        <td>${yen(getGirlPrice(s.girl))}</td>
        <td>${escapeHtml((s.tags||[]).join(" "))}</td>
        <td>${escapeHtml((s.goldTags||[]).join(" / "))}</td>
        <td>${s.source === "manual" ? "手动新增" : "房间安排"}</td>
        <td><button class="soft" onclick="openEditModal('${jsStr(s.id)}')">编辑</button> <button class="danger" onclick="deleteShift('${jsStr(s.id)}')">删除</button></td>
      </tr>`;
    });
    dataTable.innerHTML = h + "</tbody></table></div>";
  }

  function renderTags(tags,goldTags){
    const normal = (tags||[]).map(t=>`<span class="tag">${escapeHtml(t)}</span>`).join("");
    const gold = (goldTags||[]).map(t=>`<span class="gold-tag">${escapeHtml(t)}</span>`).join("");
    return normal || gold ? `<div class="tag-wrap">${gold}${normal}</div>` : "";
  }

  function renderPreview(){
    const d = shiftDate.value || today;
    const rows = rowsForDate();
    const titleDate = d.replaceAll("-","").slice(4);
    posterTitle.textContent = previewMode === "custom" ? `${titleDate}${weekdayCN(d)}出勤` : `${titleDate} ${weekdayCN(d)}出勤`;
    previewDateText.textContent = previewMode === "custom" ? "出勤人数 " : "出勤人数：";
    previewCount.textContent = rows.length;
    shiftCount.textContent = rows.length;
    if(!rows.length){ shiftList.innerHTML = '<div class="empty">这一天还没有出勤数据</div>'; return; }
    shiftList.innerHTML = rows.map(s=>{
      const p = getGirlPrice(s.girl);
      const priceText = p > 0 ? `<span>${yen(p)}${previewMode === "custom" ? " /h" : "/h"}</span>` : `<span>¥0</span>`;
      return `<div class="shift-card"><div class="shift-card-inner">${renderAvatar(s.girl)}<div class="shift-copy"><div class="shift-name">${escapeHtml(s.girl)}${renderTags(s.tags,s.goldTags)}</div><div class="time-price-line"><span>${escapeHtml(displayTimeRange(s.start,s.end))}</span>${priceText}</div></div></div></div>`;
    }).join("");
  }

  function renderGirlSuggest(keyword=""){
    const box = girlSuggest;
    keyword = String(keyword||"").trim().toLowerCase();
    const rows = girls.filter(g => !keyword || String(g.name||"").toLowerCase().includes(keyword));
    if(!rows.length){ box.style.display="none"; return; }
    box.innerHTML = rows.map(g=>`<div onclick="chooseGirl('${jsStr(g.name)}')" style="padding:10px 12px;cursor:pointer;border-bottom:1px solid #f7d7e6;font-weight:800">🎀 ${escapeHtml(g.name)} <span style="float:right;color:#e75ca2">${yen(g.list_price||0)}</span></div>`).join("");
    box.style.display = "block";
  }
  window.chooseGirl = function(name){
    selectedGirl = name;
    girlSearch.value = name;
    girlSuggest.style.display = "none";
    refreshPriceBySelectedGirl();
    tagInput.value = (window.girlTagMemory && window.girlTagMemory[name]) ? window.girlTagMemory[name] : "";
  };

  function girlSelectOptions(selected){
    return girls.map(g=>`<option value="${escapeHtml(g.name)}" ${String(g.name)===String(selected)?"selected":""}>${escapeHtml(g.name)}｜${yen(g.list_price||0)}</option>`).join("");
  }
  window.openEditModal = function(id){
    const s = shifts.find(x => String(x.id) === String(id));
    if(!s) return;
    editingShiftId = s.id;
    editGirlSelect.innerHTML = girlSelectOptions(s.girl);
    editStartSelect.innerHTML = timeOptions(s.start);
    editEndSelect.innerHTML = timeOptions(s.end);
    editTagInput.value = (s.tags||[]).join(" ");
    editGoldTagInput.value = (s.goldTags||[]).join(" ");
    syncEditPrice();
    editModalMask.style.display = "flex";
  };
  window.syncEditPrice = function(){ editPriceShow.textContent = yen(getGirlPrice(editGirlSelect.value)); };
  window.closeEditModal = function(){ editModalMask.style.display = "none"; editingShiftId = null; };
  window.saveEditModal = async function(){
    const s = shifts.find(x => String(x.id) === String(editingShiftId));
    if(!s) return closeEditModal();
    s.girl = editGirlSelect.value;
    s.start = normalizeTime(editStartSelect.value);
    s.end = normalizeTime(editEndSelect.value);
    s.tags = splitTags(editTagInput.value || "");
    s.goldTags = splitTags(editGoldTagInput.value);
    try{
      s.id = await saveShiftToDb(s);
      window.girlTagMemory = window.girlTagMemory || {};
      window.girlTagMemory[s.girl] = (s.tags||[]).join(" ");
      closeEditModal();
      render();
    }catch(e){ console.error(e); alert(e.message || "保存失败"); }
  };

  window.setPresetTextColor = function(type){
    activateCustomPreview();
    const colors = {cyan:"#00d9ff", pink:"#ff5ca8", white:"#ffffff", gold:"#ffe17a"};
    if(fontColorInput && colors[type]) fontColorInput.value = colors[type];
    applyPreviewStyle();
  };

  window.setPresetBg = function(type){
    activateCustomPreview();
    const bgs = {
      pink:"linear-gradient(135deg,rgba(255,210,235,.72),rgba(235,220,255,.72)), radial-gradient(circle at 50% 35%,#ffffff55 0 18%,transparent 19%), linear-gradient(160deg,#ff9ccc,#d9c8ff)",
      night:"linear-gradient(135deg,rgba(20,10,30,.68),rgba(45,15,60,.55)), radial-gradient(circle at 70% 18%,#ffffff77 0 8%,transparent 9%), linear-gradient(160deg,#1a0d2d,#5b1a55,#111827)",
      gold:"linear-gradient(135deg,rgba(80,40,0,.52),rgba(255,220,120,.45)), radial-gradient(circle at 40% 25%,#fff0aa99 0 16%,transparent 17%), linear-gradient(160deg,#6c4300,#d19b22,#fff2b0)",
      blue:"linear-gradient(135deg,rgba(160,235,255,.58),rgba(230,245,255,.55)), radial-gradient(circle at 60% 25%,#ffffffaa 0 18%,transparent 19%), linear-gradient(160deg,#b8f0ff,#dff5ff,#f7fbff)"
    };
    if(type === "clear") previewBox.style.removeProperty("--poster-bg");
    else previewBox.style.setProperty("--poster-bg", bgs[type]);
  };

  function canvasToBlob(canvas){
    return new Promise(resolve => canvas.toBlob(resolve, "image/png"));
  }

  function downloadBlob(blob, filename){
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
  }

  async function copyImageBlob(blob){
    if(!navigator.clipboard || !window.ClipboardItem) return false;
    await navigator.clipboard.write([new ClipboardItem({"image/png":blob})]);
    return true;
  }

  window.captureShift = async function(){
    try{
      applyPreviewStyle();
      const canvas = await html2canvas(previewBox,{backgroundColor:null,scale:3,useCORS:true});
      const blob = await canvasToBlob(canvas);
      if(!blob) throw new Error("图片生成失败");
      const copied = await copyImageBlob(blob).catch(()=>false);
      if(copied) alert("已复制出勤图片");
      else{
        downloadBlob(blob, "alice_shift.png");
        alert("当前浏览器不支持直接复制图片，已下载PNG。");
      }
    }catch(e){ console.error(e); alert("截图失败，请确认浏览器允许复制或下载。"); }
  };

  function weekdayCN(dateStr){
    const ds=["周日","周一","周二","周三","周四","周五","周六"];
    const d = new Date(dateStr+"T00:00:00");
    return isNaN(d.getTime()) ? "" : ds[d.getDay()];
  }
  function buildCopyText(){
    const d = shiftDate.value || today;
    const rows = rowsForDate();
    let out = `${d.replaceAll("-","").slice(4)}${weekdayCN(d)}出勤\n\n`;
    rows.forEach(s=>{
      const tags = (s.tags||[]).map(t=>`（${t}）`).join("");
      const gold = (s.goldTags||[]).map(t=>`【${t}】`).join("");
      const p = getGirlPrice(s.girl);
      out += `${gold}${s.girl}${tags}\n`;
      out += p > 0 ? `${displayTimeRange(s.start,s.end)}             ${Math.round(p/1000)}000/h\n\n` : `${displayTimeRange(s.start,s.end)}             ¥0\n\n`;
    });
    out += "https://ailisi99.com/";
    return out;
  }
  window.copyShiftText = async function(){
    try{ await navigator.clipboard.writeText(buildCopyText()); alert("已复制出勤文本"); }
    catch(e){ console.error(e); alert("复制失败"); }
  };

  function render(){ applyPreviewStyle(); renderTable(); renderPreview(); }

  shiftDate.value = today;
  startSelect.innerHTML = timeOptions("19:00");
  endSelect.innerHTML = timeOptions("23:00");
  priceSelect.innerHTML = priceOptions(0);
  tagInput.value = "";
  shiftDate.addEventListener("change", ()=>loadPureShifts(true));

  window.addEventListener("DOMContentLoaded", async()=>{
    syncPreviewModeControls();
    await loadGirls();
    girlSearch.addEventListener("input", e=>{ selectedGirl = e.target.value; renderGirlSuggest(e.target.value); refreshPriceBySelectedGirl(); });
    girlSearch.addEventListener("focus", ()=>renderGirlSuggest(girlSearch.value));
    bgUpload.addEventListener("change", e=>{
      const file = e.target.files && e.target.files[0];
      if(!file) return;
      activateCustomPreview();
      const reader = new FileReader();
      reader.onload = ev => { previewBox.style.setProperty("--poster-bg", `url("${ev.target.result}")`); applyPreviewStyle(); };
      reader.readAsDataURL(file);
    });
    fontSizeRange.addEventListener("input", ()=>{ activateCustomPreview(); render(); });
    fontColorInput.addEventListener("input", ()=>{ activateCustomPreview(); render(); });
    bgSizeRange.addEventListener("input", ()=>{ activateCustomPreview(); applyPreviewStyle(); });
    document.addEventListener("click", e=>{
      if(!e.target.closest("#girlSuggest") && e.target.id !== "girlSearch") girlSuggest.style.display="none";
      if(e.target === editModalMask) closeEditModal();
    });
    render();
  });
})();
</script>
</body>
</html>
